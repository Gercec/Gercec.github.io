<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glach</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f0f5fe;
            --bg-secondary: #ffffff;
            --bg-tertiary: #e6f0ff;
            --text-primary: #1b2b4e;
            --text-secondary: #3a4f6e;
            --text-tertiary: #5f7a9e;
            --border-color: #d4e2f5;
            --accent-color: #3a7bd5;
            --accent-glow: #5b9aff;
            --accent-soft: rgba(58, 123, 213, 0.1);
            --accent-gradient: linear-gradient(135deg, #3a7bd5, #5b9aff);
            --user-message-bg: #e6f0ff;
            --assistant-message-bg: #ffffff;
            --blockquote-border: #3a7bd5;
            --shadow-color: rgba(58, 123, 213, 0.15);
            --drag-active-bg: rgba(58, 123, 213, 0.1);
            --drag-active-border: #3a7bd5;
            --warning-color: #ff8a5c;
            --warning-bg: rgba(255, 138, 92, 0.1);
            --message-gap: 24px;
            --code-block-bg: #1a2332;
            --code-block-header: #252f41;
            --code-block-text: #e2e8f0;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(58, 123, 213, 0.15);
            --glass-shadow: 0 20px 40px -12px rgba(58, 123, 213, 0.2);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #0f172a;
                --bg-secondary: #1e293b;
                --bg-tertiary: #263445;
                --text-primary: #f1f5f9;
                --text-secondary: #cbd5e1;
                --text-tertiary: #94a3b8;
                --border-color: #334155;
                --accent-color: #60a5fa;
                --accent-glow: #93c5fd;
                --accent-soft: rgba(96, 165, 250, 0.15);
                --accent-gradient: linear-gradient(135deg, #60a5fa, #93c5fd);
                --user-message-bg: #263445;
                --assistant-message-bg: #1e293b;
                --blockquote-border: #60a5fa;
                --shadow-color: rgba(0, 0, 0, 0.4);
                --drag-active-bg: rgba(96, 165, 250, 0.15);
                --drag-active-border: #60a5fa;
                --warning-color: #fdba74;
                --warning-bg: rgba(253, 186, 116, 0.1);
                --code-block-bg: #0f172a;
                --code-block-header: #1e293b;
                --glass-bg: rgba(30, 41, 59, 0.8);
                --glass-border: rgba(96, 165, 250, 0.15);
                --glass-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.5);
            }
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-tertiary) 100%);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 70% 30%, rgba(58, 123, 213, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .header {
            padding: 20px 28px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 10;
            position: relative;
            box-shadow: var(--glass-shadow);
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 10%;
            right: 10%;
            height: 2px;
            background: var(--accent-gradient);
            border-radius: 2px;
            opacity: 0.5;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .fixed-avatar {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 10px 20px -5px var(--shadow-color);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.5);
            position: relative;
        }

        .fixed-avatar::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent-gradient);
            opacity: 0;
            transition: opacity 0.3s;
            mix-blend-mode: overlay;
        }

        .fixed-avatar:hover {
            transform: scale(1.08) rotate(-2deg);
            border-color: white;
        }

        .fixed-avatar:hover::before {
            opacity: 0.3;
        }

        .fixed-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .glach-title {
            font-size: 28px;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .limit-notice {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--warning-bg);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: var(--warning-color);
            border: 1px solid rgba(255, 138, 92, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 4px 12px rgba(255, 138, 92, 0.1);
        }

        .limit-notice i {
            font-size: 14px;
            color: currentColor;
        }

        .creator-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            transition: all 0.2s;
            cursor: help;
            position: relative;
        }

        .creator-name:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
            transform: translateY(-2px);
        }

        .creator-name i {
            font-size: 14px;
            color: var(--accent-color);
        }

        .creator-name[title]:hover::after {
            content: attr(title);
            position: absolute;
            bottom: -40px;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            z-index: 100;
            pointer-events: none;
            animation: tooltipFade 0.2s ease;
        }

        @keyframes tooltipFade {
            from {
                opacity: 0;
                transform: translateY(5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: transparent;
            position: relative;
            z-index: 1;
        }

        .drag-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 3px dashed var(--drag-active-border);
            border-radius: 24px;
            margin: 20px;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: none;
            animation: pulseGlow 2s ease-in-out infinite;
            box-shadow: var(--glass-shadow);
        }

        .drag-overlay.show {
            display: flex;
        }

        .drag-overlay-content {
            text-align: center;
            color: var(--accent-color);
            text-shadow: 0 2px 20px var(--accent-glow);
        }

        .drag-overlay-content i {
            font-size: 56px;
            margin-bottom: 16px;
            filter: drop-shadow(0 8px 16px var(--shadow-color));
        }

        .drag-overlay-content span {
            font-size: 20px;
            font-weight: 600;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.8; box-shadow: 0 0 30px var(--accent-soft); }
            50% { opacity: 0.5; box-shadow: 0 0 50px var(--accent-soft); }
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 0;
            scroll-behavior: smooth;
        }

        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 20px;
            opacity: 0.3;
        }

        .messages-inner {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
        }

        /* Приветственный экран с аватаром */
        .welcome-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: transparent;
            z-index: 5;
            pointer-events: none;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .welcome-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .welcome-avatar {
            width: 120px;
            height: 120px;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px -10px var(--shadow-color);
            border: 3px solid white;
            margin-bottom: 24px;
            animation: float 3s ease-in-out infinite;
        }

        .welcome-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .welcome-title {
            font-size: 42px;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            animation: fadeInUp 0.6s ease;
        }

        .welcome-subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            text-align: center;
            max-width: 400px;
            line-height: 1.6;
            animation: fadeInUp 0.6s ease 0.2s both;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message {
            display: flex;
            width: 100%;
            margin-top: 0;
            margin-bottom: var(--message-gap);
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            margin: 0;
        }

        .message.assistant .message-content {
            margin-right: auto;
        }

        .message.user .message-content {
            margin-left: auto;
        }

        .message-body {
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-primary);
            word-wrap: break-word;
            padding: 16px 20px;
            border-radius: 24px;
            background: var(--user-message-bg);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .message.user .message-body {
            background: var(--accent-gradient);
            color: white;
            border-bottom-right-radius: 8px;
        }

        .message.user .message-body code {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .message.assistant .message-body {
            background: var(--assistant-message-bg);
            border-bottom-left-radius: 8px;
            border: 1px solid var(--glass-border);
        }

        .message-body strong {
            font-weight: 600;
            color: var(--accent-color);
        }

        .message.user .message-body strong {
            color: white;
            text-decoration: underline;
            text-decoration-color: rgba(255, 255, 255, 0.3);
        }

        .message-new {
            animation: messageAppear 0.3s ease forwards;
        }

        @keyframes messageAppear {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-body h1 { 
            font-size: 1.8em; 
            margin: 0.5em 0; 
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .message-body h2 { font-size: 1.5em; margin: 0.5em 0; font-weight: 600; }
        .message-body h3 { font-size: 1.3em; margin: 0.5em 0; font-weight: 600; }
        .message-body p { margin: 0.8em 0; }
        .message-body p:first-child { margin-top: 0; }
        .message-body p:last-child { margin-bottom: 0; }
        .message-body ul, .message-body ol { margin: 0.8em 0; padding-left: 1.5em; }
        .message-body li { margin: 0.3em 0; }
        
        .message-body code:not(pre code) {
            background: rgba(58, 123, 213, 0.1);
            padding: 0.2em 0.4em;
            border-radius: 8px;
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
            font-size: 0.9em;
            color: var(--accent-color);
            border: 1px solid rgba(58, 123, 213, 0.2);
        }
        
        .md-code-block {
            margin: 8px 0;
            border-radius: 16px;
            overflow: hidden;
            background: var(--code-block-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.3);
        }

        .md-code-block-banner-wrap {
            background: var(--code-block-header);
            padding: 4px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            height: 28px;
        }

        .md-code-block-banner-wrap > div {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .md-code-block-banner-wrap svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
            opacity: 0.8;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        .md-code-block-banner-wrap span {
            font-size: 11px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .md-code-block pre {
            margin: 0;
            padding: 16px;
            overflow-x: auto;
            background: transparent;
            color: var(--code-block-text);
            font-family: 'Monaco', 'Menlo', 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
        }

        .copy-code-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }

        .copy-code-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        .copy-code-btn i {
            font-size: 12px;
        }

        .code-block-small {
            display: inline-block;
            background: var(--code-block-bg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            padding: 2px 8px;
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
            font-size: 0.85em;
            margin: 0 2px;
            color: #a5f3fc;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .message-body blockquote {
            border-left: 4px solid var(--blockquote-border);
            padding-left: 16px;
            margin: 0.8em 0;
            color: var(--text-secondary);
            font-style: italic;
            background: rgba(58, 123, 213, 0.05);
            border-radius: 0 12px 12px 0;
            padding: 12px 20px;
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 16px 0;
        }

        .typing-indicator span {
            width: 10px;
            height: 10px;
            background: var(--accent-gradient);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
            box-shadow: 0 2px 8px var(--shadow-color);
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
            30% { transform: translateY(-12px); opacity: 1; }
        }

        .input-area {
            padding: 24px 24px 32px;
            background: transparent;
            z-index: 5;
            position: relative;
        }

        .input-container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .input-container::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: var(--accent-gradient);
            border-radius: 30px;
            opacity: 0.3;
            filter: blur(8px);
            transition: opacity 0.3s;
        }

        .input-container:focus-within::before {
            opacity: 0.6;
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            border-radius: 28px;
            padding: 8px 16px 8px 24px;
            transition: all 0.3s;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
            z-index: 1;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px var(--accent-soft);
        }

        #messageInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 0;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            resize: none;
            max-height: 120px;
            min-height: 48px;
            outline: none;
            color: var(--text-primary);
            line-height: 1.5;
        }

        #messageInput::placeholder {
            color: var(--text-tertiary);
            font-weight: 300;
            letter-spacing: -0.2px;
        }

        .actions {
            display: flex;
            gap: 8px;
            align-self: flex-end;
            margin-bottom: 8px;
        }

        .action-btn {
            background: transparent;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.2s;
            flex-shrink: 0;
            position: relative;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: var(--accent-gradient);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .action-btn:hover {
            color: white;
            transform: scale(1.1) rotate(5deg);
        }

        .action-btn:hover::before {
            opacity: 1;
        }

        .action-btn i {
            position: relative;
            z-index: 1;
        }

        .action-btn.send {
            color: white;
            background: var(--accent-gradient);
            box-shadow: 0 8px 16px -4px var(--accent-color);
        }

        .action-btn.send:hover {
            transform: scale(1.1) rotate(0);
            box-shadow: 0 12px 24px -4px var(--accent-color);
        }

        .preview-container {
            max-width: 800px;
            margin: 0 auto 16px;
            display: none;
        }

        .preview-container.show {
            display: block;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .preview-wrapper {
            position: relative;
            display: inline-block;
        }

        .preview-image {
            width: 100px;
            height: 100px;
            border-radius: 24px;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 20px 30px -8px var(--shadow-color);
        }

        .remove-preview {
            position: absolute;
            top: -12px;
            right: -12px;
            width: 32px;
            height: 32px;
            background: #ff4757;
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            border: 3px solid white;
            box-shadow: 0 8px 16px rgba(255, 71, 87, 0.3);
            transition: all 0.2s;
        }

        .remove-preview:hover {
            background: #ff6b81;
            transform: scale(1.1) rotate(90deg);
        }

        #fileInput {
            display: none;
        }

        .generated-image {
            max-width: 100%;
            border-radius: 24px;
            margin: 8px 0 0 0;
            box-shadow: 0 20px 30px -8px var(--shadow-color);
            border: 2px solid white;
        }

        .clear-context-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            margin-left: 10px;
        }

        .clear-context-btn:hover {
            background: var(--accent-soft);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .clear-context-btn i {
            font-size: 12px;
        }

        @media (max-width: 640px) {
            .messages-inner {
                padding: 0 16px;
            }
            
            .message-content {
                max-width: 85%;
            }
            
            .input-area {
                padding: 16px 16px 24px;
            }
            
            .creator-name span {
                display: none;
            }
            
            .creator-name[title]:hover::after {
                white-space: normal;
                max-width: 200px;
                text-align: right;
            }
            
            .limit-notice span {
                display: none;
            }
            
            .message {
                margin-bottom: 20px;
            }

            .fixed-avatar {
                width: 48px;
                height: 48px;
            }

            .glach-title {
                font-size: 24px;
            }

            .welcome-avatar {
                width: 100px;
                height: 100px;
            }

            .welcome-title {
                font-size: 36px;
            }

            .welcome-subtitle {
                font-size: 16px;
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="fixed-avatar">
                <img src="https://media.tenor.com/Leq7mrkrbbgAAAAj/rabbit-r1-bunny-ai.gif" alt="Glach">
            </div>
            <span class="glach-title">Glach</span>
            
            <div class="limit-notice" title="Информационное сообщение">
                <i class="fas fa-info-circle"></i>
                <span>beta version</span>
            </div>
            
            <button class="clear-context-btn" onclick="clearContext()" title="Очистить контекст (кроме запросов на генерацию картинок)">
                <i class="fas fa-eraser"></i>
                <span>Очистить контекст</span>
            </button>
        </div>
        <div class="creator-name" title="Осталось 9999 запросов на сегодня">
            <i class="fas fa-code"></i>
            <span>Михаил Фуркулицэ</span>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="drag-overlay" id="dragOverlay">
            <div class="drag-overlay-content">
                <i class="fas fa-cloud-arrow-up"></i>
                <span>Drop your image here</span>
            </div>
        </div>

        <!-- Приветственный экран с аватаром -->
        <div class="welcome-screen" id="welcomeScreen">
            <div class="welcome-avatar">
                <img src="https://media.tenor.com/Leq7mrkrbbgAAAAj/rabbit-r1-bunny-ai.gif" alt="Glach">
            </div>
            <h1 class="welcome-title">Glach</h1>
            <div class="welcome-subtitle">
                Спроси меня о чём угодно<br>или загрузи фото для анализа
            </div>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="messages-inner" id="messagesInner">
                <!-- Пустой чат -->
            </div>
        </div>

        <div class="preview-container" id="previewContainer">
            <div class="preview-wrapper">
                <img id="previewImage" class="preview-image" src="">
                <button class="remove-preview" onclick="removeImage()">×</button>
            </div>
        </div>

        <div class="input-area">
            <div class="input-container">
                <div class="input-wrapper">
                    <textarea 
                        id="messageInput" 
                        rows="1" 
                        placeholder="Напишите сообщение..."
                        oninput="autoResize(this)"
                    ></textarea>
                    
                    <div class="actions">
                        <button class="action-btn" onclick="document.getElementById('fileInput').click()">
                            <i class="fas fa-paperclip"></i>
                        </button>
                        
                        <button class="action-btn send" onclick="sendMessage()">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <input type="file" id="fileInput" accept="image/*" onchange="handleImageSelect(this)">
    </div>

    <script>
        const API_KEY = "sk_6KqzxrbQIfTCxVyL6U6LsjGDNVZwcXCa";
        const MODELS = {
            TEXT: 'gemini-fast',
            IMAGE: 'zimage'
        };

        const IMAGE_KEYWORDS = [
            'нарисуй', 'нарисовать', 'нарисуйте', 'нарисую',
            'сгенерируй', 'сгенерировать', 'генерация',
            'создай', 'создать', 'сделай', 'сделать',
            'изобрази', 'изобразить', 'покажи', 'показать',
            'картинку', 'картинка', 'картинки',
            'фото', 'фотографию', 'фотография',
            'изображение', 'изображения',
            'рисунок', 'рисунки', 'набросок', 'эскиз',
            'draw', 'paint', 'sketch', 'create image',
            'generate image', 'make picture', 'show picture',
            'picture', 'image', 'photo'
        ];

        // Массив для хранения истории сообщений (контекста)
        let messageHistory = [];
        
        const messagesInner = document.getElementById('messagesInner');
        const messageInput = document.getElementById('messageInput');
        const previewContainer = document.getElementById('previewContainer');
        const previewImage = document.getElementById('previewImage');
        const chatContainer = document.getElementById('chatContainer');
        const dragOverlay = document.getElementById('dragOverlay');
        const messagesArea = document.getElementById('messagesArea');
        const welcomeScreen = document.getElementById('welcomeScreen');
        
        let currentImageBase64 = null;
        let currentFile = null;
        let autoScrollEnabled = true;
        let firstMessageSent = false;

        function scrollToBottom() {
            if (autoScrollEnabled) {
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }
        }

        messagesArea.addEventListener('scroll', () => {
            const isAtBottom = messagesArea.scrollHeight - messagesArea.scrollTop - messagesArea.clientHeight < 100;
            autoScrollEnabled = isAtBottom;
        });

        window.addEventListener('DOMContentLoaded', () => {
            autoResize(messageInput);
            // Загружаем сохраненную историю при старте
            loadMessageHistory();
        });

        // Функция для очистки контекста (кроме запросов на генерацию картинок)
        function clearContext() {
            // Оставляем только сообщения, которые являются запросами на генерацию картинок
            messageHistory = messageHistory.filter(msg => 
                msg.role === 'assistant' && msg.content && msg.content.includes('<img')
            );
            
            // Очищаем отображение и перестраиваем заново
            messagesInner.innerHTML = '';
            
            // Добавляем обратно только сообщения с картинками
            messageHistory.forEach(msg => {
                if (msg.role === 'assistant' && msg.content && msg.content.includes('<img')) {
                    const messageDiv = document.createElement('div');
                    messageDiv.className = `message assistant`;
                    messageDiv.innerHTML = `<div class="message-content"><div class="message-body">${msg.content}</div></div>`;
                    messagesInner.appendChild(messageDiv);
                }
            });
            
            // Показываем приветственный экран, если сообщений не осталось
            if (messagesInner.children.length === 0) {
                firstMessageSent = false;
                welcomeScreen.classList.remove('hidden');
            }
            
            scrollToBottom();
        }

        // Функция для загрузки истории из localStorage
        function loadMessageHistory() {
            const saved = localStorage.getItem('glach_message_history');
            if (saved) {
                try {
                    messageHistory = JSON.parse(saved);
                    // Восстанавливаем сообщения в интерфейсе
                    messageHistory.forEach(msg => {
                        const messageDiv = document.createElement('div');
                        messageDiv.className = `message ${msg.role}`;
                        
                        let contentHtml = '';
                        if (msg.role === 'user') {
                            if (msg.image) {
                                contentHtml += `<div class="message-body">${msg.content ? `<p>${escapeHtml(msg.content)}</p>` : ''}<img src="${msg.image}" class="generated-image"></div>`;
                            } else {
                                contentHtml += `<div class="message-body">${escapeHtml(msg.content).replace(/\n/g, '<br>')}</div>`;
                            }
                        } else {
                            contentHtml += `<div class="message-body">${msg.content}</div>`;
                        }
                        
                        messageDiv.innerHTML = `<div class="message-content">${contentHtml}</div>`;
                        messagesInner.appendChild(messageDiv);
                    });
                    
                    if (messageHistory.length > 0) {
                        firstMessageSent = true;
                        welcomeScreen.classList.add('hidden');
                    }
                    
                    scrollToBottom();
                } catch (e) {
                    console.error('Error loading history:', e);
                }
            }
        }

        // Функция для сохранения истории в localStorage
        function saveMessageHistory() {
            localStorage.setItem('glach_message_history', JSON.stringify(messageHistory));
        }

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        function highlight() {
            dragOverlay.classList.add('show');
        }

        function unhighlight() {
            dragOverlay.classList.remove('show');
        }

        function handleDrop(e) {
            preventDefaults(e);
            unhighlight();
            
            const dt = e.dataTransfer;
            const files = dt.files;
            
            if (files.length > 0 && files[0].type.startsWith('image/')) {
                handleFile(files[0]);
                hideWelcomeScreen();
            }
        }

        function handleFile(file) {
            currentFile = file;
            const reader = new FileReader();
            
            reader.onload = function(e) {
                currentImageBase64 = e.target.result;
                previewImage.src = currentImageBase64;
                previewContainer.classList.add('show');
                messageInput.placeholder = 'Опишите фотографию...';
                hideWelcomeScreen();
            }
            
            reader.readAsDataURL(file);
        }

        function hideWelcomeScreen() {
            if (!firstMessageSent) {
                firstMessageSent = true;
                welcomeScreen.classList.add('hidden');
            }
        }

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            chatContainer.addEventListener(eventName, preventDefaults, false);
        });

        ['dragenter', 'dragover'].forEach(eventName => {
            chatContainer.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            chatContainer.addEventListener(eventName, unhighlight, false);
        });

        chatContainer.addEventListener('drop', handleDrop, false);

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            let newHeight = textarea.scrollHeight;
            const maxHeight = 120;
            textarea.style.height = (newHeight > maxHeight ? maxHeight : newHeight) + 'px';
        }

        function isImageRequest(text) {
            const lowerText = text.toLowerCase().trim();
            return IMAGE_KEYWORDS.some(keyword => 
                lowerText.includes(keyword.toLowerCase())
            );
        }

        function createCodeBlock(code, language = '') {
            const escapedCode = code
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
            
            return `
                <div class="md-code-block">
                    <div class="md-code-block-banner-wrap">
                        <div>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M16 18L22 12L16 6M8 6L2 12L8 18"/>
                            </svg>
                            <span>${language || 'code'}</span>
                        </div>
                        <button class="copy-code-btn" onclick="copyCode(this)" data-code="${escapedCode.replace(/"/g, '&quot;')}">
                            <i class="far fa-copy"></i>
                            <span>Copy</span>
                        </button>
                    </div>
                    <pre><code>${escapedCode}</code></pre>
                </div>
            `;
        }

        function replaceSymbolsWithHtml(text) {
            if (!text) return text;
            
            let processed = text.replace(/```(\w*)\n([\s\S]*?)```/g, function(match, language, code) {
                return createCodeBlock(code.trim(), language);
            });
            
            processed = processed.replace(/##(.*?)##/g, '<span class="code-block-small">$1</span>');
            
            processed = processed.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            processed = processed.replace(/\*(.*?)\*/g, '<em>$1</em>');
            processed = processed.replace(/`(.*?)`/g, '<code>$1</code>');
            
            return processed;
        }

        window.copyCode = function(button) {
            const code = button.getAttribute('data-code');
            navigator.clipboard.writeText(code).then(() => {
                const originalText = button.innerHTML;
                button.innerHTML = '<i class="fas fa-check"></i> <span>Copied!</span>';
                setTimeout(() => {
                    button.innerHTML = originalText;
                }, 2000);
            });
        };

        function addMessage(content, role, image = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role} message-new`;
            
            let contentHtml = '';
            let messageContent = '';
            
            if (role === 'user') {
                if (image) {
                    contentHtml += `<div class="message-body">${content ? `<p>${escapeHtml(content)}</p>` : ''}<img src="${image}" class="generated-image"></div>`;
                    messageContent = content || '';
                } else {
                    contentHtml += `<div class="message-body">${escapeHtml(content).replace(/\n/g, '<br>')}</div>`;
                    messageContent = content;
                }
            } else {
                const formattedContent = replaceSymbolsWithHtml(content);
                contentHtml += `<div class="message-body">${formattedContent}</div>`;
                messageContent = content;
            }

            messageDiv.innerHTML = `<div class="message-content">${contentHtml}</div>`;
            messagesInner.appendChild(messageDiv);
            
            // Сохраняем в историю, если это не запрос на генерацию картинки
            if (!(role === 'user' && isImageRequest(content))) {
                messageHistory.push({
                    role: role,
                    content: role === 'assistant' ? contentHtml : messageContent,
                    image: image || null
                });
                saveMessageHistory();
            }
            
            scrollToBottom();
        }

        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            messagesInner.appendChild(typingDiv);
            scrollToBottom();
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text && !currentImageBase64) return;

            // Скрываем приветственный экран при первом сообщении
            hideWelcomeScreen();

            addMessage(text, 'user', currentImageBase64);
            
            messageInput.value = '';
            autoResize(messageInput);
            
            showTyping();

            try {
                if (currentImageBase64) {
                    await analyzeWithVision(text || 'Что на этом фото?');
                    removeImage();
                } else if (isImageRequest(text)) {
                    await generateImage(text);
                } else {
                    await generateText(text);
                }
            } catch (error) {
                console.error('Error:', error);
                hideTyping();
                addMessage('❌ Ошибка. Попробуйте ещё раз.', 'assistant');
            }
        }

        async function generateText(prompt) {
            try {
                const systemPrompt = "Ты - Glach, современный креативный ассистент. Отвечай стильно, свежо и по делу. Используй эмодзи умеренно. Язык - русский. Ты умеешь: генерировать тексты, отвечать на вопросы, переводить, писать код, творчески подходить к задачам, суммировать информацию, а также распознавать текст, предметы и людей на фотографиях. Если тебя просят нарисовать или сгенерировать изображение - ты можешь это сделать.";
                
                // Формируем сообщения с учетом истории
                const messages = [
                    { role: 'system', content: systemPrompt },
                    ...messageHistory.map(msg => ({
                        role: msg.role,
                        content: msg.role === 'user' ? msg.content : msg.content.replace(/<[^>]*>/g, '') // Убираем HTML из ответов ассистента для контекста
                    })),
                    { role: 'user', content: prompt }
                ];
                
                const response = await fetch('https://gen.pollinations.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: MODELS.TEXT,
                        messages: messages
                    })
                });
                
                const data = await response.json();
                hideTyping();
                
                if (data.choices && data.choices[0]) {
                    addMessage(data.choices[0].message.content, 'assistant');
                }
                
            } catch (error) {
                hideTyping();
                addMessage('❌ Ошибка', 'assistant');
            }
        }

        async function generateImage(prompt) {
            let cleanPrompt = prompt.replace(/нарисуй|сгенерируй|создай|изобрази/gi, '').trim() || 'красивый пейзаж';
            const imageUrl = `https://gen.pollinations.ai/image/${encodeURIComponent(cleanPrompt)}?model=${MODELS.IMAGE}&width=1024&height=1024&enhance=true&nologo=true&key=${API_KEY}`;
            
            hideTyping();
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant message-new';
            messageDiv.innerHTML = `
                <div class="message-content">
                    <div class="message-body">
                        <img src="${imageUrl}" class="generated-image">
                    </div>
                </div>
            `;
            
            messagesInner.appendChild(messageDiv);
            
            // Сохраняем в историю (картинки сохраняются)
            messageHistory.push({
                role: 'assistant',
                content: `<img src="${imageUrl}" class="generated-image">`,
                image: null
            });
            saveMessageHistory();
            
            scrollToBottom();
        }

        async function analyzeWithVision(question) {
            try {
                const systemPrompt = "Ты - Glach. Ты умеешь распознавать текст, предметы и людей на фотографиях. Отвечай стильно и коротко. 1-2 предложения.";
                
                const response = await fetch('https://gen.pollinations.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: MODELS.TEXT,
                        messages: [
                            { role: 'system', content: systemPrompt },
                            {
                                role: 'user',
                                content: [
                                    { type: 'text', text: question },
                                    { type: 'image_url', image_url: { url: currentImageBase64 } }
                                ]
                            }
                        ]
                    })
                });
                
                const data = await response.json();
                hideTyping();
                
                if (data.choices && data.choices[0]) {
                    addMessage(data.choices[0].message.content, 'assistant');
                }
                
            } catch (error) {
                hideTyping();
                addMessage('❌ Ошибка анализа', 'assistant');
            }
        }

        function handleImageSelect(input) {
            if (input.files && input.files[0]) {
                handleFile(input.files[0]);
            }
        }

        function removeImage() {
            currentImageBase64 = null;
            currentFile = null;
            previewContainer.classList.remove('show');
            previewImage.src = '';
            document.getElementById('fileInput').value = '';
            messageInput.placeholder = 'Напишите сообщение...';
        }

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Скрываем приветственный экран при клике на поле ввода
        messageInput.addEventListener('focus', () => {
            if (!firstMessageSent && messageInput.value.trim() === '') {
                // Не скрываем, только если пользователь просто хочет напечатать
            }
        });
    </script>
</body>
                </html>
