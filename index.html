<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Герой нашего времени • Тесты</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Source+Serif+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #4a6fa5;
            --primary-dark: #385d8a;
            --secondary: #6d9dc5;
            --accent: #ff7e5f;
            --light: #f8f9fa;
            --gray: #e9ecef;
            --dark: #343a40;
            --text: #495057;
            --text-light: #6c757d;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.12);
            --radius: 12px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        /* Header */
        header {
            text-align: center;
            padding: 60px 20px 50px;
            margin-bottom: 40px;
            position: relative;
        }
        
        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 300px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            clip-path: polygon(0 0, 100% 0, 100% 70%, 0 100%);
            z-index: -1;
        }
        
        .header-content {
            position: relative;
            z-index: 1;
        }
        
        h1 {
            font-family: 'Source Serif Pro', serif;
            font-size: 3.5rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: white;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        
        h1 span {
            display: block;
            font-size: 1.8rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 10px;
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.85);
            max-width: 700px;
            margin: 0 auto 25px;
            font-weight: 300;
            line-height: 1.8;
        }
        
        .author {
            display: inline-block;
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            font-size: 1.1rem;
            color: white;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            margin-bottom: 60px;
        }
        
        .control-btn {
            padding: 18px 40px;
            background: white;
            border: none;
            color: var(--primary);
            border-radius: var(--radius);
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }
        
        .control-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            opacity: 0;
            transition: var(--transition);
            z-index: -1;
        }
        
        .control-btn:hover {
            color: white;
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }
        
        .control-btn:hover::before {
            opacity: 1;
        }
        
        .control-btn i {
            transition: var(--transition);
        }
        
        .control-btn:hover i {
            transform: rotate(180deg);
        }
        
        /* Cards Grid */
        .quizzes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-bottom: 80px;
        }
        
        .quiz-card {
            background: white;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            cursor: pointer;
            border: 1px solid var(--gray);
            transition: var(--transition);
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .quiz-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
            border-color: var(--secondary);
        }
        
        .quiz-header {
            padding: 25px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .quiz-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
        }
        
        .quiz-icon {
            font-size: 2.2rem;
            color: white;
            margin-bottom: 15px;
            opacity: 0.9;
            background: rgba(255, 255, 255, 0.15);
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            backdrop-filter: blur(5px);
        }
        
        .quiz-title {
            font-family: 'Source Serif Pro', serif;
            font-size: 1.7rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: white;
        }
        
        .quiz-subtitle {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 300;
        }
        
        .quiz-number {
            position: absolute;
            top: 20px;
            right: 20px;
            font-weight: 600;
            color: white;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.15);
            padding: 6px 12px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }
        
        .quiz-content {
            padding: 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }
        
        .quiz-description {
            margin-bottom: 25px;
            color: var(--text-light);
            line-height: 1.7;
            flex-grow: 1;
            font-size: 0.95rem;
        }
        
        .quiz-stats {
            display: flex;
            justify-content: space-between;
            color: var(--text-light);
            font-size: 0.9rem;
            border-top: 1px solid var(--gray);
            padding-top: 20px;
        }
        
        .quiz-stats span {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .start-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: white;
            color: var(--primary);
            border: 2px solid var(--gray);
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 20px;
            font-weight: 600;
            position: relative;
            overflow: hidden;
        }
        
        .start-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            opacity: 0;
            transition: var(--transition);
            z-index: -1;
        }
        
        .start-btn:hover {
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
        }
        
        .start-btn:hover::before {
            opacity: 1;
        }
        
        .start-btn i {
            transition: var(--transition);
        }
        
        .start-btn:hover i {
            transform: translateX(5px);
        }
        
        /* Modal */
        .quiz-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            overflow-y: auto;
            backdrop-filter: blur(5px);
        }
        
        .modal-content {
            background: white;
            margin: 40px auto;
            width: 90%;
            max-width: 800px;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            animation: modalAppear 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        @keyframes modalAppear {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .modal-header {
            padding: 30px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: relative;
            overflow: hidden;
        }
        
        .modal-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            opacity: 0.3;
        }
        
        .modal-header h2 {
            font-family: 'Source Serif Pro', serif;
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0;
            padding-right: 40px;
            position: relative;
            z-index: 1;
        }
        
        .close-modal {
            position: relative;
            cursor: pointer;
            color: white;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: var(--transition);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border: none;
            flex-shrink: 0;
            font-size: 1.5rem;
            z-index: 1;
        }
        
        .close-modal:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(90deg);
        }
        
        .question-container {
            padding: 40px 35px;
            min-height: 400px;
        }
        
        .question {
            font-family: 'Source Serif Pro', serif;
            font-size: 1.6rem;
            margin-bottom: 35px;
            color: var(--dark);
            font-weight: 600;
            line-height: 1.5;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--gray);
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }
        
        .option {
            padding: 18px 25px;
            background: white;
            border: 2px solid var(--gray);
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        
        .option::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 5px;
            background: var(--primary);
            opacity: 0;
            transition: var(--transition);
        }
        
        .option:hover {
            border-color: var(--primary);
            background: rgba(74, 111, 165, 0.05);
            transform: translateX(5px);
        }
        
        .option:hover::before {
            opacity: 1;
        }
        
        .option.selected {
            border-color: var(--primary);
            background: rgba(74, 111, 165, 0.1);
            box-shadow: 0 5px 15px rgba(74, 111, 165, 0.1);
        }
        
        .option.selected::before {
            opacity: 1;
        }
        
        .option.correct {
            border-color: #28a745;
            background: rgba(40, 167, 69, 0.1);
        }
        
        .option.correct::before {
            background: #28a745;
        }
        
        .option.incorrect {
            border-color: #dc3545;
            background: rgba(220, 53, 69, 0.1);
        }
        
        .option.incorrect::before {
            background: #dc3545;
        }
        
        .option-letter {
            font-weight: 700;
            margin-right: 20px;
            color: var(--primary);
            font-size: 1.2rem;
            min-width: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(74, 111, 165, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 8px;
        }
        
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 35px;
            border-top: 2px solid var(--gray);
            background: white;
        }
        
        .btn {
            padding: 14px 28px;
            background: white;
            color: var(--primary);
            border: 2px solid var(--gray);
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: var(--transition);
            min-width: 150px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            opacity: 0;
            transition: var(--transition);
            z-index: -1;
        }
        
        .btn:hover {
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
        }
        
        .btn:hover::before {
            opacity: 1;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn:disabled:hover::before {
            opacity: 0;
        }
        
        .btn:disabled:hover {
            color: var(--primary);
            border-color: var(--gray);
        }
        
        .question-counter {
            color: var(--primary);
            font-size: 1.1rem;
            font-weight: 600;
            background: rgba(74, 111, 165, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
        }
        
        .results {
            padding: 60px 40px;
            text-align: center;
        }
        
        .results h2 {
            font-family: 'Source Serif Pro', serif;
            color: var(--dark);
            margin-bottom: 30px;
            font-size: 2rem;
            font-weight: 600;
        }
        
        .score-circle {
            width: 180px;
            height: 180px;
            margin: 30px auto;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .score-circle svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }
        
        .score-circle circle {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
            transform: translate(10px, 10px);
        }
        
        .circle-bg {
            stroke: var(--gray);
        }
        
        .circle-progress {
            stroke: var(--primary);
            stroke-dasharray: 440;
            stroke-dashoffset: 440;
            transition: stroke-dashoffset 1s ease;
        }
        
        .score-number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: 700;
            color: var(--primary);
        }
        
        .score-text {
            font-size: 1.3rem;
            color: var(--text-light);
            margin-bottom: 40px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.7;
        }
        
        .restart-btn {
            padding: 18px 45px;
            background: white;
            color: var(--primary);
            border: 2px solid var(--gray);
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .restart-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            opacity: 0;
            transition: var(--transition);
            z-index: -1;
        }
        
        .restart-btn:hover {
            color: white;
            border-color: transparent;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(74, 111, 165, 0.2);
        }
        
        .restart-btn:hover::before {
            opacity: 1;
        }
        
        .restart-btn i {
            transition: var(--transition);
        }
        
        .restart-btn:hover i {
            transform: rotate(180deg);
        }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .quizzes-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            
            h1 span {
                font-size: 1.5rem;
            }
            
            .quizzes-grid {
                grid-template-columns: 1fr;
                gap: 25px;
            }
            
            .controls {
                padding: 0 20px;
            }
            
            .control-btn {
                width: 100%;
                max-width: 300px;
            }
            
            .modal-content {
                width: 95%;
                margin: 20px auto;
            }
            
            .modal-header {
                flex-direction: column;
                align-items: stretch;
                padding: 20px;
            }
            
            .modal-header h2 {
                padding-right: 0;
                margin-bottom: 15px;
                font-size: 1.6rem;
            }
            
            .close-modal {
                align-self: flex-end;
            }
            
            .navigation {
                flex-direction: column;
                gap: 20px;
            }
            
            .btn {
                width: 100%;
            }
            
            .question-container {
                padding: 25px 20px;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 20px 15px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .option {
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>Герой нашего времени<br><span>Литературные тесты</span></h1>
                <p class="subtitle">Исследуйте классический роман Михаила Лермонтова через интерактивные тесты по разным аспектам произведения</p>
                <div class="author">Михаил Юрьевич Лермонтов • 1839—1840</div>
            </div>
        </header>
        
        <main>
            <div class="controls">
                <button class="control-btn" id="randomBtn">
                    <i class="fas fa-random"></i> Случайный тест
                </button>
            </div>
            
            <div class="quizzes-grid" id="quizzesGrid">
                <!-- Карточки будут сгенерированы JavaScript -->
            </div>
        </main>
    </div>
    
    <!-- Модальное окно с тестом -->
    <div id="quizModal" class="quiz-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="quizTitle">Тест: Загрузка...</h2>
                <button class="close-modal" id="closeModal">&times;</button>
            </div>
            
            <div id="questionContainer" class="question-container">
                <!-- Вопросы будут вставлены JavaScript -->
            </div>
            
            <div class="navigation">
                <button class="btn" id="prevBtn" disabled>Назад</button>
                <div class="question-counter">
                    Вопрос <span id="currentQuestion">1</span> из <span id="totalQuestions">10</span>
                </div>
                <button class="btn" id="nextBtn">Далее</button>
            </div>
        </div>
    </div>
    
    <script>
        // Данные для тестов
        const quizzes = {
            1: {
                title: "Бэла",
                subtitle: "Первая повесть",
                icon: "fa-mountain",
                questions: [
                    {
                        question: "Кто является рассказчиком в повести 'Бэла'?",
                        options: [
                            "Печорин",
                            "Максим Максимыч",
                            "Сам автор",
                            "Доктор Вернер"
                        ],
                        correct: 1
                    },
                    {
                        question: "Как Печорин познакомился с Бэлой?",
                        options: [
                            "На балу в крепости",
                            "Увидел её на свадьбе сестры",
                            "Её привезли в крепость как пленницу",
                            "Она работала служанкой в доме коменданта"
                        ],
                        correct: 1
                    },
                    {
                        question: "Что подарил Печорин Бэле, чтобы завоевать её расположение?",
                        options: [
                            "Золотые серьги",
                            "Дорогой кинжал",
                            "Красивого коня",
                            "Шёлковый платок"
                        ],
                        correct: 2
                    },
                    {
                        question: "Как погибает Бэла?",
                        options: [
                            "От чахотки",
                            "Её убивает Казбич",
                            "Кончает жизнь самоубийством",
                            "Погибает во время набега горцев"
                        ],
                        correct: 1
                    },
                    {
                        question: "Кто такой Казбич?",
                        options: [
                            "Отец Бэлы",
                            "Брат Бэлы",
                            "Влюбленный в неё горец",
                            "Слуга Печорина"
                        ],
                        correct: 2
                    },
                    {
                        question: "Какую вещь украл Казбич у отца Бэлы?",
                        options: [
                            "Деньги",
                            "Оружие",
                            "Коня Карагеза",
                            "Семейные реликвии"
                        ],
                        correct: 2
                    },
                    {
                        question: "Как Печорин отреагировал на смерть Бэлы?",
                        options: [
                            "Был безутешен и долго плакал",
                            "Остался внешне спокоен, но внутренне страдал",
                            "Сразу уехал из крепости",
                            "Поклялся отомстить Казбичу"
                        ],
                        correct: 1
                    },
                    {
                        question: "Сколько времени Бэла прожила с Печориным в крепости?",
                        options: [
                            "Несколько недель",
                            "Четыре месяца",
                            "Около года",
                            "Больше двух лет"
                        ],
                        correct: 1

            "Позиция Лермонтова", "Современные оценки", "Эпоха 1830-1840-х годов",
            "Глубина характеров", "Черты романтизма", "Элементы реализма",
            "Символы и их значение", "Вечные вопросы бытия", "Моральные дилеммы",
            "Особенности языка", "Своеобразие жанра", "Временная организация",
            "Пространственные образы"
        ];

        const cardIcons = [
            "fa-mountain", "fa-handshake", "fa-ship", "fa-heart", "fa-dice",
            "fa-user", "fa-female", "fa-book", "fa-star", "fa-globe",
            "fa-users", "fa-fire", "fa-pen", "fa-comment", "fa-history",
            "fa-brain", "fa-moon", "fa-sun", "fa-dove", "fa-question",
            "fa-balance-scale", "fa-language", "fa-feather", "fa-clock", "fa-map"
        ];

        for (let i = 0; i < 25; i++) {
            const quizId = (i % 7) + 1;
            const card = document.createElement('div');
            card.className = 'quiz-card';
            card.setAttribute('data-quiz', quizId);
            
            card.innerHTML = `
                <div class="quiz-header">
                    <div class="quiz-icon">
                        <i class="fas ${cardIcons[i]}"></i>
                    </div>
                    <div>
                        <h2 class="quiz-title">${cardTitles[i]}</h2>
                        <p class="quiz-subtitle">${cardSubtitles[i]}</p>
                    </div>
                    <div class="quiz-number">#${String(i + 1).padStart(2, '0')}</div>
                </div>
                <div class="quiz-content">
                    <p class="quiz-description">Тест по теме "${cardTitles[i]}". Проверьте свои знания о романе "Герой нашего времени" через анализ ${cardSubtitles[i].toLowerCase()}.</p>
                    <div class="quiz-stats">
                        <span><i class="fas fa-question-circle"></i> 10 вопросов</span>
                        <span><i class="fas fa-clock"></i> 6-8 минут</span>
                    </div>
                    <button class="start-btn" data-quiz="${quizId}">
                        <i class="fas fa-play-circle"></i> Начать тест
                    </button>
                </div>
            `;
            
            quizzesGrid.appendChild(card);
        }

        // Переменные для отслеживания состояния
        let currentQuiz = null;
        let currentQuestionIndex = 0;
        let userAnswers = [];
        let score = 0;

        // Элементы DOM
        const quizModal = document.getElementById('quizModal');
        const closeModal = document.getElementById('closeModal');
        const questionContainer = document.getElementById('questionContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const currentQuestionSpan = document.getElementById('currentQuestion');
        const totalQuestionsSpan = document.getElementById('totalQuestions');
        const quizTitle = document.getElementById('quizTitle');
        const randomBtn = document.getElementById('randomBtn');

        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            // Добавляем обработчики для карточек
            document.addEventListener('click', function(e) {
                if (e.target.classList.contains('start-btn')) {
                    e.stopPropagation();
                    const quizId = e.target.getAttribute('data-quiz');
                    startQuiz(quizId);
                }
                
                if (e.target.closest('.quiz-card') && !e.target.classList.contains('start-btn')) {
                    const card = e.target.closest('.quiz-card');
                    const quizId = card.getAttribute('data-quiz');
                    startQuiz(quizId);
                }
            });
            
            // Кнопка случайного теста
            randomBtn.addEventListener('click', function() {
                const randomId = Math.floor(Math.random() * 7) + 1;
                startQuiz(randomId);
            });
            
            // Закрытие модального окна
            closeModal.addEventListener('click', closeQuizModal);
            
            // Кнопки навигации
            prevBtn.addEventListener('click', showPreviousQuestion);
            nextBtn.addEventListener('click', showNextQuestion);
            
            // Закрытие модального окна при клике вне его
            quizModal.addEventListener('click', function(e) {
                if (e.target === quizModal) {
                    closeQuizModal();
                }
            });
        });

        // Запуск теста
        function startQuiz(quizId) {
            currentQuiz = quizzes[quizId];
            currentQuestionIndex = 0;
            userAnswers = new Array(currentQuiz.questions.length).fill(null);
            score = 0;
            
            quizTitle.textContent = `Тест: ${currentQuiz.title}`;
            totalQuestionsSpan.textContent = currentQuiz.questions.length;
            
            showQuestion();
            quizModal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        // Показать вопрос
        function showQuestion() {
            const question = currentQuiz.questions[currentQuestionIndex];
            
            currentQuestionSpan.textContent = currentQuestionIndex + 1;
            
            let questionHTML = `
                <div class="question">${question.question}</div>
                <div class="options">
            `;
            
            question.options.forEach((option, index) => {
                let optionClass = 'option';
                if (userAnswers[currentQuestionIndex] === index) {
                    optionClass += ' selected';
                }
                
                questionHTML += `
                    <div class="${optionClass}" data-index="${index}">
                        <span class="option-letter">${String.fromCharCode(65 + index)}</span>
                        ${option}
                    </div>
                `;
            });
            
            questionHTML += `</div>`;
            
            questionContainer.innerHTML = questionHTML;
            
            document.querySelectorAll('.option').forEach(option => {
                option.addEventListener('click', function() {
                    if (!this.classList.contains('correct') && !this.classList.contains('incorrect')) {
                        document.querySelectorAll('.option').forEach(opt => {
                            opt.classList.remove('selected');
                        });
                        
                        this.classList.add('selected');
                        userAnswers[currentQuestionIndex] = parseInt(this.getAttribute('data-index'));
                        
                        if (currentQuestionIndex < currentQuiz.questions.length - 1) {
                            nextBtn.disabled = false;
                        }
                    }
                });
            });
            
            prevBtn.disabled = currentQuestionIndex === 0;
            nextBtn.textContent = currentQuestionIndex === currentQuiz.questions.length - 1 ? 'Завершить' : 'Далее';
        }

        // Показать предыдущий вопрос
        function showPreviousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                showQuestion();
            }
        }

        // Показать следующий вопрос
        function showNextQuestion() {
            if (currentQuestionIndex === currentQuiz.questions.length - 1) {
                finishQuiz();
                return;
            }
            
            if (currentQuestionIndex < currentQuiz.questions.length - 1) {
                currentQuestionIndex++;
                showQuestion();
            }
        }

        // Завершить тест
        function finishQuiz() {
            score = 0;
            currentQuiz.questions.forEach((question, index) => {
                if (userAnswers[index] === question.correct) {
                    score++;
                }
            });
            
            showResults();
        }

        // Показать результаты с анимированным кругом
        function showResults() {
            const percentage = Math.round((score / currentQuiz.questions.length) * 100);
            const circleLength = 440;
            const offset = circleLength - (percentage / 100) * circleLength;
            
            let message = '';
            
            if (percentage === 100) {
                message = 'Блестящий результат! Вы прекрасно разбираетесь в творчестве Лермонтова.';
            } else if (percentage >= 80) {
                message = 'Отличный результат! Ваши знания о романе глубоки и точны.';
            } else if (percentage >= 60) {
                message = 'Хороший результат! Вы хорошо знакомы с произведением.';
            } else if (percentage >= 40) {
                message = 'Удовлетворительный результат. Рекомендуем перечитать роман.';
            } else {
                message = 'Рекомендуем внимательно изучить роман "Герой нашего времени".';
            }
            
            const resultsHTML = `
                <div class="results">
                    <h2>Результаты теста</h2>
                    <div class="score-circle">
                        <svg>
                            <circle class="circle-bg" cx="80" cy="80" r="70"></circle>
                            <circle class="circle-progress" cx="80" cy="80" r="70" style="stroke-dashoffset: ${offset}"></circle>
                        </svg>
                        <div class="score-number">${score}/${currentQuiz.questions.length}</div>
                    </div>
                    <div class="score-text">${percentage}% правильных ответов</div>
                    <p>${message}</p>
                    <button class="restart-btn" id="restartBtn">
                        <i class="fas fa-redo"></i> Пройти ещё раз
                    </button>
                </div>
            `;
            
            questionContainer.innerHTML = resultsHTML;
            document.querySelector('.navigation').style.display = 'none';
            
            // Анимация заполнения круга
            setTimeout(() => {
                document.querySelector('.circle-progress').style.transition = 'stroke-dashoffset 1.5s ease';
            }, 100);
            
            document.getElementById('restartBtn').addEventListener('click', function() {
                currentQuestionIndex = 0;
                userAnswers = new Array(currentQuiz.questions.length).fill(null);
                document.querySelector('.navigation').style.display = 'flex';
                showQuestion();
            });
        }

        // Закрыть модальное окно
        function closeQuizModal() {
            quizModal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
