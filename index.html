<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glach</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafd;
            --bg-tertiary: #f0f3f8;
            --text-primary: #1f2a3a;
            --text-secondary: #5f6b7a;
            --text-tertiary: #94a3b8;
            --border-color: #e9edf2;
            --accent-color: #4b7bec;
            --accent-hover: #3a6ad9;
            --accent-soft: rgba(75, 123, 236, 0.1);
            --user-message-bg: #e9edf2;
            --assistant-message-bg: #f0f3f8;
            --code-bg: #f0f3f8;
            --blockquote-border: #4b7bec;
            --shadow-color: rgba(0, 0, 0, 0.05);
            --drag-active-bg: rgba(75, 123, 236, 0.05);
            --drag-active-border: #4b7bec;
            --success-color: #34c759;
            --warning-color: #ff9500;
            --warning-bg: rgba(255, 149, 0, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #1a1f2b;
                --bg-secondary: #252b38;
                --bg-tertiary: #2f3645;
                --text-primary: #e5e9f0;
                --text-secondary: #a0a8b8;
                --text-tertiary: #7f8a9a;
                --border-color: #363f51;
                --accent-color: #5f8aee;
                --accent-hover: #4b7bec;
                --accent-soft: rgba(95, 138, 238, 0.15);
                --user-message-bg: #2f3645;
                --assistant-message-bg: #2f3645;
                --code-bg: #252b38;
                --blockquote-border: #5f8aee;
                --shadow-color: rgba(0, 0, 0, 0.3);
                --drag-active-bg: rgba(95, 138, 238, 0.1);
                --drag-active-border: #5f8aee;
                --success-color: #34c759;
                --warning-color: #ffb340;
                --warning-bg: rgba(255, 179, 64, 0.1);
            }
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            width: 100vw;
            position: relative;
            overflow: hidden;
        }

        /* Header - независимое позиционирование */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-primary);
            z-index: 1000;
        }

        .header-left {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px var(--shadow-color);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .title {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .balance {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-tertiary);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid var(--border-color);
        }

        .balance i {
            color: var(--success-color);
        }

        .limit {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--warning-bg);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--warning-color);
            border: 1px solid rgba(255, 149, 0, 0.3);
        }

        .creator {
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-tertiary);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .creator i {
            color: var(--accent-color);
        }

        /* Контейнер для чата */
        .chat {
            position: fixed;
            top: 70px;
            left: 0;
            width: 100%;
            height: calc(100vh - 70px);
            background: var(--bg-primary);
        }

        /* Область сообщений - независимый скроллящийся контейнер */
        .messages-scroll {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% - 100px);
            overflow-y: auto;
        }

        /* Контейнер для списка сообщений */
        .messages-list {
            position: relative;
            width: 100%;
            min-height: 100%;
            padding: 20px 0;
        }

        /* Базовый контейнер для сообщения */
        .message-container {
            position: relative;
            width: 100%;
            margin-bottom: 24px;
            clear: both;
        }

        /* Сообщения ассистента - всегда слева */
        .assistant-message {
            position: relative;
            float: left;
            clear: both;
            background: var(--assistant-message-bg);
            border-radius: 18px 18px 18px 4px;
            max-width: 70%;
            padding: 12px 16px;
            margin-left: 24px;
        }

        /* Сообщения пользователя - всегда справа */
        .user-message {
            position: relative;
            float: right;
            clear: both;
            background: var(--user-message-bg);
            border-radius: 18px 18px 4px 18px;
            max-width: 70%;
            padding: 12px 16px;
            margin-right: 24px;
        }

        /* Общие стили для текста в сообщениях */
        .message-text {
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-primary);
            word-wrap: break-word;
        }

        .message-text h1 { font-size: 1.8em; margin: 0.5em 0; font-weight: 600; }
        .message-text h2 { font-size: 1.5em; margin: 0.5em 0; font-weight: 600; }
        .message-text h3 { font-size: 1.3em; margin: 0.5em 0; font-weight: 600; }
        .message-text p { margin: 0.8em 0; }
        .message-text p:first-child { margin-top: 0; }
        .message-text p:last-child { margin-bottom: 0; }
        .message-text ul, .message-text ol { margin: 0.8em 0; padding-left: 1.5em; }
        .message-text li { margin: 0.3em 0; }
        .message-text code {
            background: var(--code-bg);
            padding: 0.2em 0.4em;
            border-radius: 6px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9em;
        }
        .message-text pre {
            background: var(--code-bg);
            padding: 16px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 0.8em 0;
        }
        .message-text pre code {
            background: none;
            padding: 0;
        }
        .message-text blockquote {
            border-left: 4px solid var(--blockquote-border);
            padding-left: 16px;
            margin: 0.8em 0;
            color: var(--text-secondary);
        }
        .message-text table {
            border-collapse: collapse;
            width: 100%;
            margin: 0.8em 0;
        }
        .message-text th, .message-text td {
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            text-align: left;
        }
        .message-text th {
            background: var(--bg-tertiary);
            font-weight: 600;
        }
        .message-text a {
            color: var(--accent-color);
            text-decoration: none;
        }
        .message-text a:hover {
            text-decoration: underline;
        }
        .message-text img {
            max-width: 100%;
            border-radius: 12px;
            margin: 0.5em 0;
        }

        .generated-image {
            max-width: 100%;
            border-radius: 16px;
            margin: 8px 0 0 0;
            box-shadow: 0 4px 12px var(--shadow-color);
        }

        /* Индикатор печатания - слева как у ассистента */
        .typing-container {
            position: relative;
            float: left;
            clear: both;
            background: var(--assistant-message-bg);
            border-radius: 18px 18px 18px 4px;
            padding: 16px 20px;
            margin-left: 24px;
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--text-tertiary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        /* Область ввода - независимый контейнер */
        .input-area {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-primary);
        }

        .input-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: calc(100% - 48px);
            max-width: 800px;
            height: 60px;
        }

        .input-field {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 0 8px 0 20px;
            transition: all 0.2s;
        }

        .input-field:focus-within {
            border-color: var(--accent-color);
            background: var(--bg-primary);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        #messageInput {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            resize: none;
            outline: none;
            color: var(--text-primary);
            height: 40px;
            line-height: 40px;
        }

        #messageInput::placeholder {
            color: var(--text-tertiary);
        }

        .action-buttons {
            display: flex;
            gap: 4px;
            height: 44px;
        }

        .action-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .send-btn {
            color: var(--accent-color);
            background: var(--accent-soft);
        }

        .send-btn:hover {
            background: var(--accent-color);
            color: white;
        }

        /* Превью фото - независимый контейнер */
        .preview {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            display: none;
        }

        .preview.show {
            display: block;
        }

        .preview-content {
            position: relative;
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 4px;
            box-shadow: 0 4px 12px var(--shadow-color);
        }

        .preview-image {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
            border: 2px solid var(--accent-color);
        }

        .preview-remove {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 24px;
            height: 24px;
            background: #ff3b30;
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            border: 2px solid var(--bg-primary);
        }

        /* Drag overlay - независимый контейнер */
        .drag-overlay {
            position: fixed;
            top: 70px;
            left: 0;
            width: 100%;
            height: calc(100vh - 70px);
            background: var(--drag-active-bg);
            border: 3px dashed var(--drag-active-border);
            border-radius: 12px;
            margin: 20px;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            z-index: 3000;
            pointer-events: none;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .drag-overlay.show {
            display: flex;
        }

        .drag-content {
            text-align: center;
            color: var(--accent-color);
        }

        .drag-content i {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .drag-content span {
            font-size: 18px;
            font-weight: 500;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.4; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .assistant-message,
        .user-message,
        .typing-container {
            animation: fadeIn 0.3s ease;
        }

        #fileInput {
            display: none;
        }

        @media (max-width: 640px) {
            .header-left {
                left: 16px;
                gap: 8px;
            }
            
            .creator {
                right: 16px;
            }
            
            .creator span,
            .limit span {
                display: none;
            }
            
            .balance span {
                font-size: 12px;
            }
            
            .assistant-message,
            .user-message,
            .typing-container {
                max-width: 85%;
            }
            
            .assistant-message {
                margin-left: 16px;
            }
            
            .user-message {
                margin-right: 16px;
            }
            
            .typing-container {
                margin-left: 16px;
            }
            
            .input-wrapper {
                width: calc(100% - 32px);
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="avatar">
                <img src="https://media.tenor.com/Leq7mrkrbbgAAAAj/rabbit-r1-bunny-ai.gif" alt="Glach">
            </div>
            <span class="title">Glach</span>
            <div class="balance" id="balanceDisplay">
                <i class="fas fa-leaf"></i>
                <span>∞ pollen</span>
            </div>
            <div class="limit">
                <i class="fas fa-info-circle"></i>
                <span>число запросов строго ограничено</span>
            </div>
        </div>
        <div class="creator">
            <i class="fas fa-code"></i>
            <span>Михаил Фуркулицэ</span>
        </div>
    </div>

    <!-- Chat -->
    <div class="chat" id="chatContainer">
        <!-- Messages -->
        <div class="messages-scroll" id="messagesScroll">
            <div class="messages-list" id="messagesList">
                <!-- Приветственное сообщение ассистента -->
                <div class="message-container">
                    <div class="assistant-message">
                        <div class="message-text">
                            <p>👋 Привет! Я Glach</p>
                            <p>Я умею:</p>
                            <ul>
                                <li><strong>📝 Писать тексты</strong> — посты, сочинения, ответы</li>
                                <li><strong>🎨 Рисовать картинки</strong> — скажи "нарисуй..."</li>
                                <li><strong>📸 Смотреть фото</strong> — загрузи и спроси что хочешь</li>
                            </ul>
                            <p>Чем помочь? 😊</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Preview -->
        <div class="preview" id="previewContainer">
            <div class="preview-content">
                <img id="previewImage" class="preview-image" src="">
                <button class="preview-remove" onclick="removeImage()">×</button>
            </div>
        </div>

        <!-- Input -->
        <div class="input-area">
            <div class="input-wrapper">
                <div class="input-field">
                    <textarea 
                        id="messageInput" 
                        rows="1" 
                        placeholder="Спроси что угодно..."
                        oninput="autoResize(this)"
                    ></textarea>
                    
                    <div class="action-buttons">
                        <button class="action-btn" onclick="document.getElementById('fileInput').click()">
                            <i class="fas fa-paperclip"></i>
                        </button>
                        
                        <button class="action-btn send-btn" onclick="sendMessage()">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <input type="file" id="fileInput" accept="image/*" onchange="handleImageSelect(this)">
    </div>

    <!-- Drag Overlay -->
    <div class="drag-overlay" id="dragOverlay">
        <div class="drag-content">
            <i class="fas fa-cloud-upload-alt"></i>
            <span>Отпустите фото для загрузки</span>
        </div>
    </div>

    <script>
        const API_KEY = "sk_RqUBvfIpPWiwfgHLr1hYVP0Y9LY5Gl0B";
        const MODELS = {
            TEXT: 'gemini-fast',
            IMAGE: 'zimage'
        };

        const IMAGE_KEYWORDS = [
            'нарисуй', 'нарисовать', 'нарисуйте', 'нарисую',
            'сгенерируй', 'сгенерировать', 'генерация',
            'создай', 'создать', 'сделай', 'сделать',
            'изобрази', 'изобразить', 'покажи', 'показать',
            'картинку', 'картинка', 'картинки',
            'фото', 'фотографию', 'фотография',
            'изображение', 'изображения',
            'рисунок', 'рисунки', 'набросок', 'эскиз',
            'пейзаж', 'портрет', 'натюрморт',
            'иллюстрация', 'иллюстрацию',
            'открытку', 'открытка', 'плакат', 'постер',
            'баннер', 'логотип', 'дизайн', 'арт',
            'draw', 'paint', 'sketch', 'create image',
            'generate image', 'make picture', 'show picture',
            'create a picture', 'generate a photo',
            'picture', 'image', 'photo', 'photograph',
            'illustration', 'drawing', 'sketch', 'art',
            'poster', 'banner', 'logo', 'design',
            'нарисуй-ка', 'нарисуйте мне',
            'сгенерируй изображение', 'создай картинку',
            'покажи картинку', 'сделай фото',
            'хочу увидеть', 'как выглядит',
            'вообрази', 'представь'
        ];

        const messagesList = document.getElementById('messagesList');
        const messageInput = document.getElementById('messageInput');
        const previewContainer = document.getElementById('previewContainer');
        const previewImage = document.getElementById('previewImage');
        const chatContainer = document.getElementById('chatContainer');
        const dragOverlay = document.getElementById('dragOverlay');
        const balanceElement = document.getElementById('balanceDisplay');
        const messagesScroll = document.getElementById('messagesScroll');
        
        let currentImageBase64 = null;
        let currentFile = null;

        async function checkBalance() {
            try {
                const response = await fetch('https://gen.pollinations.ai/account/balance', {
                    headers: { 'Authorization': `Bearer ${API_KEY}` }
                });
                const data = await response.json();
                balanceElement.innerHTML = `<i class="fas fa-leaf"></i><span>${data.balance} pollen</span>`;
            } catch (error) {
                balanceElement.innerHTML = `<i class="fas fa-leaf"></i><span>∞ pollen</span>`;
            }
        }
        checkBalance();

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        function highlight() {
            dragOverlay.classList.add('show');
        }

        function unhighlight() {
            dragOverlay.classList.remove('show');
        }

        function handleDrop(e) {
            preventDefaults(e);
            unhighlight();
            
            const dt = e.dataTransfer;
            const files = dt.files;
            
            if (files.length > 0 && files[0].type.startsWith('image/')) {
                handleFile(files[0]);
            }
        }

        function handleFile(file) {
            currentFile = file;
            const reader = new FileReader();
            
            reader.onload = function(e) {
                currentImageBase64 = e.target.result;
                previewImage.src = currentImageBase64;
                previewContainer.classList.add('show');
                messageInput.placeholder = 'Задайте вопрос о фото...';
            }
            
            reader.readAsDataURL(file);
        }

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            chatContainer.addEventListener(eventName, preventDefaults, false);
        });

        ['dragenter', 'dragover'].forEach(eventName => {
            chatContainer.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            chatContainer.addEventListener(eventName, unhighlight, false);
        });

        chatContainer.addEventListener('drop', handleDrop, false);

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = (textarea.scrollHeight) + 'px';
        }

        function isImageRequest(text) {
            const lowerText = text.toLowerCase().trim();
            return IMAGE_KEYWORDS.some(keyword => {
                return lowerText.includes(keyword.toLowerCase()) ||
                       lowerText.startsWith(keyword.toLowerCase() + ' ') ||
                       lowerText.endsWith(' ' + keyword.toLowerCase()) ||
                       lowerText.includes(' ' + keyword.toLowerCase() + ' ');
            });
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text && !currentImageBase64) return;

            addMessage(text, 'user', currentImageBase64);
            
            messageInput.value = '';
            autoResize(messageInput);
            
            showTyping();

            try {
                if (currentImageBase64) {
                    await analyzeWithVision(text || 'Что на этом фото?');
                    removeImage();
                } else if (isImageRequest(text)) {
                    await generateImage(text);
                } else {
                    await generateText(text);
                }
            } catch (error) {
                console.error('Error:', error);
                hideTyping();
                addMessage('❌ Ошибка. Попробуйте ещё раз.', 'assistant');
            }
            
            checkBalance();
        }

        function addMessage(content, role, image = null) {
            const messageContainer = document.createElement('div');
            messageContainer.className = 'message-container';
            
            if (role === 'user') {
                const userMessage = document.createElement('div');
                userMessage.className = 'user-message';
                
                const messageText = document.createElement('div');
                messageText.className = 'message-text';
                
                if (image) {
                    if (content) {
                        const p = document.createElement('p');
                        p.textContent = content;
                        messageText.appendChild(p);
                    }
                    const img = document.createElement('img');
                    img.src = image;
                    img.className = 'generated-image';
                    messageText.appendChild(img);
                } else {
                    messageText.innerHTML = escapeHtml(content).replace(/\n/g, '<br>');
                }
                
                userMessage.appendChild(messageText);
                messageContainer.appendChild(userMessage);
            } else {
                const assistantMessage = document.createElement('div');
                assistantMessage.className = 'assistant-message';
                
                const messageText = document.createElement('div');
                messageText.className = 'message-text';
                messageText.innerHTML = content;
                
                assistantMessage.appendChild(messageText);
                messageContainer.appendChild(assistantMessage);
            }
            
            messagesList.appendChild(messageContainer);
            messagesScroll.scrollTop = messagesScroll.scrollHeight;
        }

        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function showTyping() {
            const typingContainer = document.createElement('div');
            typingContainer.className = 'message-container';
            typingContainer.id = 'typingIndicator';
            
            const typing = document.createElement('div');
            typing.className = 'typing-container';
            typing.innerHTML = `
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            
            typingContainer.appendChild(typing);
            messagesList.appendChild(typingContainer);
            messagesScroll.scrollTop = messagesScroll.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        async function generateText(prompt) {
            try {
                const systemPrompt = "Ты - Glach, полезный ассистент. Отвечай МАКСИМАЛЬНО КОРОТКО и по делу. Без лишних слов. 1-3 предложения. Используй язык пользователя. Упоминай создателя (Михаил Фуркулицэ) ТОЛЬКО если прямо спросят.";
                
                const needsComplexFormatting = 
                    prompt.toLowerCase().includes('код') ||
                    prompt.toLowerCase().includes('программа') ||
                    prompt.toLowerCase().includes('функция') ||
                    prompt.toLowerCase().includes('таблица') ||
                    prompt.toLowerCase().includes('сравни') ||
                    prompt.toLowerCase().includes('список');

                const formatInstruction = needsComplexFormatting 
                    ? '\n\nЕсли нужно, используй HTML теги: <strong>, <em>, <code>, <pre>.'
                    : '';

                const response = await fetch('https://gen.pollinations.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: MODELS.TEXT,
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: prompt + formatInstruction }
                        ]
                    })
                });
                
                const data = await response.json();
                hideTyping();
                
                if (data.choices && data.choices[0]) {
                    addMessage(data.choices[0].message.content, 'assistant');
                }
                
            } catch (error) {
                hideTyping();
                addMessage('❌ Ошибка', 'assistant');
            }
        }

        async function generateImage(prompt) {
            let cleanPrompt = prompt;
            
            const sortedKeywords = [...IMAGE_KEYWORDS].sort((a, b) => b.length - a.length);
            
            sortedKeywords.forEach(keyword => {
                const regex = new RegExp(keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
                cleanPrompt = cleanPrompt.replace(regex, '');
            });
            
            cleanPrompt = cleanPrompt
                .replace(/[,\s.!?]+$/, '')
                .replace(/^[,\s.!?]+/, '')
                .trim();
            
            const finalPrompt = cleanPrompt || prompt.replace(/нарисуй|сгенерируй|создай|изобрази/gi, '').trim() || 'красивый пейзаж';
            
            const imageUrl = `https://gen.pollinations.ai/image/${encodeURIComponent(finalPrompt)}?model=${MODELS.IMAGE}&width=1024&height=1024&enhance=true&nologo=true&key=${API_KEY}`;
            
            hideTyping();
            
            const messageContainer = document.createElement('div');
            messageContainer.className = 'message-container';
            
            const assistantMessage = document.createElement('div');
            assistantMessage.className = 'assistant-message';
            
            const messageText = document.createElement('div');
            messageText.className = 'message-text';
            
            const img = document.createElement('img');
            img.src = imageUrl;
            img.className = 'generated-image';
            messageText.appendChild(img);
            
            assistantMessage.appendChild(messageText);
            messageContainer.appendChild(assistantMessage);
            
            messagesList.appendChild(messageContainer);
            messagesScroll.scrollTop = messagesScroll.scrollHeight;
        }

        async function analyzeWithVision(question) {
            try {
                const systemPrompt = "Ты - Glach. Отвечай МАКСИМАЛЬНО КОРОТКО. 1-2 предложения. Только суть.";
                
                const response = await fetch('https://gen.pollinations.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: MODELS.TEXT,
                        messages: [
                            { role: 'system', content: systemPrompt },
                            {
                                role: 'user',
                                content: [
                                    { type: 'text', text: question },
                                    { type: 'image_url', image_url: { url: currentImageBase64 } }
                                ]
                            }
                        ]
                    })
                });
                
                const data = await response.json();
                hideTyping();
                
                if (data.choices && data.choices[0]) {
                    addMessage(data.choices[0].message.content, 'assistant');
                }
                
            } catch (error) {
                hideTyping();
                addMessage('❌ Ошибка анализа', 'assistant');
            }
        }

        function handleImageSelect(input) {
            if (input.files && input.files[0]) {
                handleFile(input.files[0]);
            }
        }

        function removeImage() {
            currentImageBase64 = null;
            currentFile = null;
            previewContainer.classList.remove('show');
            previewImage.src = '';
            document.getElementById('fileInput').value = '';
            messageInput.placeholder = 'Спроси что угодно...';
        }

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
