<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glach</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafd;
            --bg-tertiary: #f0f3f8;
            --text-primary: #1f2a3a;
            --text-secondary: #5f6b7a;
            --text-tertiary: #94a3b8;
            --border-color: #e9edf2;
            --accent-color: #4b7bec;
            --accent-hover: #3a6ad9;
            --accent-soft: rgba(75, 123, 236, 0.1);
            --user-message-bg: #e9edf2;
            --assistant-message-bg: #f0f3f8;
            --code-bg: #f0f3f8;
            --blockquote-border: #4b7bec;
            --shadow-color: rgba(0, 0, 0, 0.05);
            --drag-active-bg: rgba(75, 123, 236, 0.05);
            --drag-active-border: #4b7bec;
            --success-color: #34c759;
            --warning-color: #ff9500;
            --warning-bg: rgba(255, 149, 0, 0.1);
            --message-gap: 28px; /* Увеличил расстояние для надежности */
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #1a1f2b;
                --bg-secondary: #252b38;
                --bg-tertiary: #2f3645;
                --text-primary: #e5e9f0;
                --text-secondary: #a0a8b8;
                --text-tertiary: #7f8a9a;
                --border-color: #363f51;
                --accent-color: #5f8aee;
                --accent-hover: #4b7bec;
                --accent-soft: rgba(95, 138, 238, 0.15);
                --user-message-bg: #2f3645;
                --assistant-message-bg: #2f3645;
                --code-bg: #252b38;
                --blockquote-border: #5f8aee;
                --shadow-color: rgba(0, 0, 0, 0.3);
                --drag-active-bg: rgba(95, 138, 238, 0.1);
                --drag-active-border: #5f8aee;
                --success-color: #34c759;
                --warning-color: #ffb340;
                --warning-bg: rgba(255, 179, 64, 0.1);
            }
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease, color 0.2s ease, border-color 0.2s ease;
        }

        .header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-primary);
            position: relative;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .fixed-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px var(--shadow-color);
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        .fixed-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .fixed-avatar:hover {
            transform: scale(1.05);
        }

        .glach-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .balance-display {
            display: none;
        }

        .limit-notice {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--warning-bg);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--warning-color);
            border: 1px solid rgba(255, 149, 0, 0.3);
            white-space: nowrap;
        }

        .limit-notice i {
            font-size: 12px;
        }

        .creator-name {
            font-size: 14px;
            color: var(--text-tertiary);
            background: var(--bg-tertiary);
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: auto;
        }

        .creator-name i {
            font-size: 12px;
            color: var(--accent-color);
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-primary);
            position: relative;
        }

        .drag-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--drag-active-bg);
            border: 3px dashed var(--drag-active-border);
            border-radius: 12px;
            margin: 20px;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            z-index: 100;
            pointer-events: none;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .drag-overlay.show {
            display: flex;
        }

        .drag-overlay-content {
            text-align: center;
            color: var(--accent-color);
        }

        .drag-overlay-content i {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .drag-overlay-content span {
            font-size: 18px;
            font-weight: 500;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.4; }
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 0;
            scroll-behavior: smooth;
        }

        .messages-inner {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
        }

        /* Исправленная система отступов */
        .message {
            display: flex;
            width: 100%;
            animation: fadeIn 0.3s ease;
            margin-top: 0;
            margin-bottom: var(--message-gap); /* Гарантированный отступ снизу */
        }

        /* Убираем отступ только у самого последнего сообщения */
        .message:last-child {
            margin-bottom: 0;
        }

        /* Дополнительная страховка для всех сообщений */
        .message + .message {
            margin-top: 0; /* Убираем возможные верхние отступы */
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            margin: 0;
        }

        .message.assistant .message-content {
            margin-right: auto;
        }

        .message.user .message-content {
            margin-left: auto;
        }

        .message-body {
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-primary);
            word-wrap: break-word;
            padding: 12px 16px;
            border-radius: 18px;
        }

        .message.user .message-body {
            background: var(--user-message-bg);
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-body {
            background: var(--assistant-message-bg);
            border-bottom-left-radius: 4px;
        }

        .message-body h1 { font-size: 1.8em; margin: 0.5em 0; font-weight: 600; }
        .message-body h2 { font-size: 1.5em; margin: 0.5em 0; font-weight: 600; }
        .message-body h3 { font-size: 1.3em; margin: 0.5em 0; font-weight: 600; }
        .message-body p { margin: 0.8em 0; }
        .message-body p:first-child { margin-top: 0; }
        .message-body p:last-child { margin-bottom: 0; }
        .message-body ul, .message-body ol { margin: 0.8em 0; padding-left: 1.5em; }
        .message-body li { margin: 0.3em 0; }
        .message-body code {
            background: var(--code-bg);
            padding: 0.2em 0.4em;
            border-radius: 6px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9em;
        }
        .message-body pre {
            background: var(--code-bg);
            padding: 16px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 0.8em 0;
        }
        .message-body pre code {
            background: none;
            padding: 0;
        }
        .message-body blockquote {
            border-left: 4px solid var(--blockquote-border);
            padding-left: 16px;
            margin: 0.8em 0;
            color: var(--text-secondary);
        }
        .message-body table {
            border-collapse: collapse;
            width: 100%;
            margin: 0.8em 0;
        }
        .message-body th, .message-body td {
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            text-align: left;
        }
        .message-body th {
            background: var(--bg-tertiary);
            font-weight: 600;
        }
        .message-body a {
            color: var(--accent-color);
            text-decoration: none;
        }
        .message-body a:hover {
            text-decoration: underline;
        }
        .message-body img {
            max-width: 100%;
            border-radius: 12px;
            margin: 0.5em 0;
        }

        .generated-image {
            max-width: 100%;
            border-radius: 16px;
            margin: 8px 0 0 0;
            box-shadow: 0 4px 12px var(--shadow-color);
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--text-tertiary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        .input-area {
            border-top: 1px solid var(--border-color);
            padding: 24px;
            background: var(--bg-primary);
            position: relative;
            z-index: 5;
        }

        .input-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 8px 12px 8px 20px;
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-color);
            background: var(--bg-primary);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        #messageInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 0;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            resize: none;
            max-height: 120px;
            min-height: 40px;
            outline: none;
            color: var(--text-primary);
            line-height: 1.3;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        #messageInput::-webkit-scrollbar {
            display: none;
        }

        #messageInput::placeholder {
            color: var(--text-tertiary);
        }

        .actions {
            display: flex;
            gap: 4px;
            align-self: flex-end;
            margin-bottom: 4px;
        }

        .action-btn {
            background: transparent;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .action-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .action-btn.send {
            color: var(--accent-color);
            background: var(--accent-soft);
        }

        .action-btn.send:hover {
            background: var(--accent-color);
            color: white;
        }

        .preview-container {
            max-width: 800px;
            margin: 0 auto 12px;
            display: none;
        }

        .preview-container.show {
            display: block;
        }

        .preview-wrapper {
            position: relative;
            display: inline-block;
        }

        .preview-image {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid var(--accent-color);
        }

        .remove-preview {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 24px;
            height: 24px;
            background: #ff3b30;
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            border: 2px solid var(--bg-primary);
        }

        .remove-preview:hover {
            background: #ff1f1f;
        }

        #fileInput {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            .messages-inner {
                padding: 0 16px;
            }
            
            .message-content {
                max-width: 85%;
            }
            
            .input-area {
                padding: 16px;
            }
            
            .creator-name span {
                display: none;
            }
            
            .creator-name i {
                margin-right: 0;
            }
            
            .header-left {
                gap: 8px;
            }
            
            .limit-notice {
                font-size: 12px;
                padding: 4px 8px;
            }
            
            .limit-notice span {
                display: none;
            }
            
            .message {
                margin-bottom: 20px; /* Чуть меньше на мобилках */
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="fixed-avatar">
                <img src="https://media.tenor.com/Leq7mrkrbbgAAAAj/rabbit-r1-bunny-ai.gif" alt="Glach">
            </div>
            <span class="glach-title">Glach</span>
            
            <div class="limit-notice" title="Информационное сообщение">
                <i class="fas fa-info-circle"></i>
                <span>число запросов строго ограничено</span>
            </div>
        </div>
        <div class="creator-name">
            <i class="fas fa-code"></i>
            <span>Михаил Фуркулицэ</span>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="drag-overlay" id="dragOverlay">
            <div class="drag-overlay-content">
                <i class="fas fa-cloud-upload-alt"></i>
                <span>Отпустите фото для загрузки</span>
            </div>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="messages-inner" id="messagesInner">
                <!-- Приветственное сообщение -->
                <div class="message assistant">
                    <div class="message-content">
                        <div class="message-body">
                            <p>👋 Привет! Я Glach</p>
                            <p>Я умею:</p>
                            <ul>
                                <li><strong>📝 Писать тексты</strong> — посты, сочинения, ответы</li>
                                <li><strong>🎨 Рисовать картинки</strong> — скажи "нарисуй..."</li>
                                <li><strong>📸 Смотреть фото</strong> — загрузи и спроси что хочешь</li>
                            </ul>
                            <p>Чем помочь? 😊</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="preview-container" id="previewContainer">
            <div class="preview-wrapper">
                <img id="previewImage" class="preview-image" src="">
                <button class="remove-preview" onclick="removeImage()">×</button>
            </div>
        </div>

        <div class="input-area">
            <div class="input-container">
                <div class="input-wrapper">
                    <textarea 
                        id="messageInput" 
                        rows="1" 
                        placeholder="Спроси что угодно..."
                        oninput="autoResize(this)"
                    ></textarea>
                    
                    <div class="actions">
                        <button class="action-btn" onclick="document.getElementById('fileInput').click()">
                            <i class="fas fa-paperclip"></i>
                        </button>
                        
                        <button class="action-btn send" onclick="sendMessage()">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <input type="file" id="fileInput" accept="image/*" onchange="handleImageSelect(this)">
    </div>

    <script>
        const API_KEY = "sk_RqUBvfIpPWiwfgHLr1hYVP0Y9LY5Gl0B";
        const MODELS = {
            TEXT: 'gemini-fast',
            IMAGE: 'zimage'
        };

        const IMAGE_KEYWORDS = [
            'нарисуй', 'нарисовать', 'нарисуйте', 'нарисую',
            'сгенерируй', 'сгенерировать', 'генерация',
            'создай', 'создать', 'сделай', 'сделать',
            'изобрази', 'изобразить', 'покажи', 'показать',
            'картинку', 'картинка', 'картинки',
            'фото', 'фотографию', 'фотография',
            'изображение', 'изображения',
            'рисунок', 'рисунки', 'набросок', 'эскиз',
            'пейзаж', 'портрет', 'натюрморт',
            'иллюстрация', 'иллюстрацию',
            'открытку', 'открытка', 'плакат', 'постер',
            'баннер', 'логотип', 'дизайн', 'арт',
            'draw', 'paint', 'sketch', 'create image',
            'generate image', 'make picture', 'show picture',
            'create a picture', 'generate a photo',
            'picture', 'image', 'photo', 'photograph',
            'illustration', 'drawing', 'sketch', 'art',
            'poster', 'banner', 'logo', 'design',
            'нарисуй-ка', 'нарисуйте мне',
            'сгенерируй изображение', 'создай картинку',
            'покажи картинку', 'сделай фото',
            'хочу увидеть', 'как выглядит',
            'вообрази', 'представь'
        ];

        const messagesInner = document.getElementById('messagesInner');
        const messageInput = document.getElementById('messageInput');
        const previewContainer = document.getElementById('previewContainer');
        const previewImage = document.getElementById('previewImage');
        const chatContainer = document.getElementById('chatContainer');
        const dragOverlay = document.getElementById('dragOverlay');
        
        let currentImageBase64 = null;
        let currentFile = null;

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        function highlight() {
            dragOverlay.classList.add('show');
        }

        function unhighlight() {
            dragOverlay.classList.remove('show');
        }

        function handleDrop(e) {
            preventDefaults(e);
            unhighlight();
            
            const dt = e.dataTransfer;
            const files = dt.files;
            
            if (files.length > 0 && files[0].type.startsWith('image/')) {
                handleFile(files[0]);
            }
        }

        function handleFile(file) {
            currentFile = file;
            const reader = new FileReader();
            
            reader.onload = function(e) {
                currentImageBase64 = e.target.result;
                previewImage.src = currentImageBase64;
                previewContainer.classList.add('show');
                messageInput.placeholder = 'Задайте вопрос о фото...';
            }
            
            reader.readAsDataURL(file);
        }

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            chatContainer.addEventListener(eventName, preventDefaults, false);
        });

        ['dragenter', 'dragover'].forEach(eventName => {
            chatContainer.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            chatContainer.addEventListener(eventName, unhighlight, false);
        });

        chatContainer.addEventListener('drop', handleDrop, false);

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            
            let newHeight = textarea.scrollHeight;
            const maxHeight = 120;
            
            if (newHeight > maxHeight) {
                textarea.style.height = maxHeight + 'px';
            } else {
                textarea.style.height = newHeight + 'px';
            }
        }

        function isImageRequest(text) {
            const lowerText = text.toLowerCase().trim();
            return IMAGE_KEYWORDS.some(keyword => {
                return lowerText.includes(keyword.toLowerCase()) ||
                       lowerText.startsWith(keyword.toLowerCase() + ' ') ||
                       lowerText.endsWith(' ' + keyword.toLowerCase()) ||
                       lowerText.includes(' ' + keyword.toLowerCase() + ' ');
            });
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text && !currentImageBase64) return;

            addMessage(text, 'user', currentImageBase64);
            
            messageInput.value = '';
            autoResize(messageInput);
            
            showTyping();

            try {
                if (currentImageBase64) {
                    await analyzeWithVision(text || 'Что на этом фото?');
                    removeImage();
                } else if (isImageRequest(text)) {
                    await generateImage(text);
                } else {
                    await generateText(text);
                }
            } catch (error) {
                console.error('Error:', error);
                hideTyping();
                addMessage('❌ Ошибка. Попробуйте ещё раз.', 'assistant');
            }
        }

        function addMessage(content, role, image = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            let contentHtml = '';
            
            if (role === 'user') {
                if (image) {
                    contentHtml += `<div class="message-body">${content ? `<p>${escapeHtml(content)}</p>` : ''}<img src="${image}" class="generated-image"></div>`;
                } else {
                    contentHtml += `<div class="message-body">${escapeHtml(content).replace(/\n/g, '<br>')}</div>`;
                }
            } else {
                contentHtml += `<div class="message-body">${content}</div>`;
            }

            messageDiv.innerHTML = `<div class="message-content">${contentHtml}</div>`;
            
            messagesInner.appendChild(messageDiv);
            
            // Принудительно применяем отступы через пересчет
            messagesInner.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }

        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            messagesInner.appendChild(typingDiv);
            messagesInner.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        async function generateText(prompt) {
            try {
                const systemPrompt = "Ты - Glach, полезный ассистент. Отвечай локанично и по делу. Без лишних слов. Используй язык пользователя. Упоминай создателя (Михаил Фуркулицэ) ТОЛЬКО если прямо спросят.";
                
                const needsComplexFormatting = 
                    prompt.toLowerCase().includes('код') ||
                    prompt.toLowerCase().includes('программа') ||
                    prompt.toLowerCase().includes('функция') ||
                    prompt.toLowerCase().includes('таблица') ||
                    prompt.toLowerCase().includes('сравни') ||
                    prompt.toLowerCase().includes('список');

                const formatInstruction = needsComplexFormatting 
                    ? '\n\nЕсли нужно, используй HTML теги: <strong>, <em>, <code>, <pre>.'
                    : '';

                const response = await fetch('https://gen.pollinations.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: MODELS.TEXT,
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: prompt + formatInstruction }
                        ]
                    })
                });
                
                const data = await response.json();
                hideTyping();
                
                if (data.choices && data.choices[0]) {
                    addMessage(data.choices[0].message.content, 'assistant');
                }
                
            } catch (error) {
                hideTyping();
                addMessage('❌ Ошибка', 'assistant');
            }
        }

        async function generateImage(prompt) {
            let cleanPrompt = prompt;
            
            const sortedKeywords = [...IMAGE_KEYWORDS].sort((a, b) => b.length - a.length);
            
            sortedKeywords.forEach(keyword => {
                const regex = new RegExp(keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
                cleanPrompt = cleanPrompt.replace(regex, '');
            });
            
            cleanPrompt = cleanPrompt
                .replace(/[,\s.!?]+$/, '')
                .replace(/^[,\s.!?]+/, '')
                .trim();
            
            const finalPrompt = cleanPrompt || prompt.replace(/нарисуй|сгенерируй|создай|изобрази/gi, '').trim() || 'красивый пейзаж';
            
            const imageUrl = `https://gen.pollinations.ai/image/${encodeURIComponent(finalPrompt)}?model=${MODELS.IMAGE}&width=1024&height=1024&enhance=true&nologo=true&key=${API_KEY}`;
            
            hideTyping();
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.innerHTML = `
                <div class="message-content">
                    <div class="message-body">
                        <img src="${imageUrl}" class="generated-image">
                    </div>
                </div>
            `;
            
            messagesInner.appendChild(messageDiv);
            messagesInner.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }

        async function analyzeWithVision(question) {
            try {
                const systemPrompt = "Ты - Glach. Отвечай МАКСИМАЛЬНО КОРОТКО. 1-2 предложения. Только суть.";
                
                const response = await fetch('https://gen.pollinations.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: MODELS.TEXT,
                        messages: [
                            { role: 'system', content: systemPrompt },
                            {
                                role: 'user',
                                content: [
                                    { type: 'text', text: question },
                                    { type: 'image_url', image_url: { url: currentImageBase64 } }
                                ]
                            }
                        ]
                    })
                });
                
                const data = await response.json();
                hideTyping();
                
                if (data.choices && data.choices[0]) {
                    addMessage(data.choices[0].message.content, 'assistant');
                }
                
            } catch (error) {
                hideTyping();
                addMessage('❌ Ошибка анализа', 'assistant');
            }
        }

        function handleImageSelect(input) {
            if (input.files && input.files[0]) {
                handleFile(input.files[0]);
            }
        }

        function removeImage() {
            console.log('Removing image...');
            currentImageBase64 = null;
            currentFile = null;
            previewContainer.classList.remove('show');
            previewImage.src = '';
            document.getElementById('fileInput').value = '';
            messageInput.placeholder = 'Спроси что угодно...';
        }

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            autoResize(messageInput);
        });
    </script>
</body>
