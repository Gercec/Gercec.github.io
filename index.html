<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Glach - AI Assistant</title>
<link rel="icon" href="https://media.tenor.com/Leq7mrkrbbgAAAAj/rabbit-r1-bunny-ai.gif" type="image/gif">
<link rel="shortcut icon" href="https://media.tenor.com/Leq7mrkrbbgAAAAj/rabbit-r1-bunny-ai.gif" type="image/gif">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

:root {
--bg-primary: #0f172a;
--bg-secondary: #1e293b;
--bg-tertiary: #263445;
--text-primary: #f1f5f9;
--text-secondary: #cbd5e1;
--text-tertiary: #94a3b8;
--border-color: #334155;
--accent-color: #60a5fa;
--accent-glow: #93c5fd;
--accent-soft: rgba(96, 165, 250, 0.15);
--accent-gradient: linear-gradient(135deg, #60a5fa, #93c5fd);
--user-message-bg: #263445;
--assistant-message-bg: #1e293b;
--shadow-color: rgba(0, 0, 0, 0.4);
--glass-bg: rgba(30, 41, 59, 0.8);
--glass-border: rgba(96, 165, 250, 0.15);
--warning-bg: rgba(245, 158, 11, 0.15);
--warning-color: #fbbf24;
}

body {
font-family: 'Inter', sans-serif;
background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-tertiary) 100%);
color: var(--text-primary);
height: 100vh;
display: flex;
flex-direction: column;
}

.header {
padding: 20px 28px;
border-bottom: 1px solid var(--glass-border);
display: flex;
align-items: center;
justify-content: space-between;
background: var(--glass-bg);
backdrop-filter: blur(12px);
}

.header-left {
display: flex;
align-items: center;
gap: 16px;
flex-wrap: wrap;
}

.fixed-avatar {
width: 56px;
height: 56px;
border-radius: 18px;
overflow: hidden;
border: 2px solid rgba(255, 255, 255, 0.5);
}

.fixed-avatar img {
width: 100%;
height: 100%;
object-fit: cover;
}

.glach-title {
font-size: 28px;
font-weight: 700;
background: var(--accent-gradient);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}

.beta-notice {
display: flex;
align-items: center;
gap: 8px;
background: var(--warning-bg);
padding: 8px 16px;
border-radius: 40px;
font-size: 13px;
color: var(--warning-color);
border: 1px solid rgba(245, 158, 11, 0.3);
}

.creator-name {
font-size: 14px;
color: var(--text-secondary);
background: var(--glass-bg);
padding: 8px 16px;
border-radius: 40px;
display: flex;
align-items: center;
gap: 8px;
margin-left: auto;
border: 1px solid var(--glass-border);
}

.chat-container {
flex: 1;
display: flex;
flex-direction: column;
overflow: hidden;
position: relative;
}

.messages-area {
flex: 1;
overflow-y: auto;
padding: 24px 0;
}

.messages-area::-webkit-scrollbar {
width: 6px;
}

.messages-area::-webkit-scrollbar-thumb {
background: var(--accent-color);
border-radius: 20px;
}

.messages-inner {
max-width: 800px;
margin: 0 auto;
padding: 0 24px;
display: flex;
flex-direction: column;
width: 100%;
}

.welcome-screen {
position: absolute;
top: 0;
left: 0;
right: 0;
bottom: 0;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
background: transparent;
transition: opacity 0.5s ease;
pointer-events: none;
}

.welcome-screen.hidden {
opacity: 0;
}

.welcome-avatar {
width: 120px;
height: 120px;
border-radius: 30px;
overflow: hidden;
margin-bottom: 24px;
animation: float 3s ease-in-out infinite;
}

.welcome-avatar img {
width: 100%;
height: 100%;
object-fit: cover;
}

.welcome-title {
font-size: 42px;
font-weight: 700;
background: var(--accent-gradient);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
margin-bottom: 16px;
}

.welcome-subtitle {
font-size: 18px;
color: var(--text-secondary);
text-align: center;
}

@keyframes float {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-10px); }
}

.message {
display: flex;
width: 100%;
margin-bottom: 24px;
}

.message.assistant {
justify-content: flex-start;
}

.message.user {
justify-content: flex-end;
}

.message-content {
max-width: 85%;
width: fit-content;
}

.message.user .message-content {
display: flex;
justify-content: flex-end;
}

.message-body {
font-size: 16px;
line-height: 1.6;
padding: 16px 20px;
border-radius: 24px;
background: var(--user-message-bg);
border: 1px solid rgba(255, 255, 255, 0.2);
white-space: pre-wrap;
word-wrap: break-word;
width: 100%;
}

.message.user .message-body {
background: var(--accent-gradient);
color: white;
border-bottom-right-radius: 8px;
max-width: 100%;
}

.message.assistant .message-body {
background: var(--assistant-message-bg);
border-bottom-left-radius: 8px;
border: 1px solid var(--glass-border);
max-width: 100%;
}

.message-body p {
margin-bottom: 12px;
}

.message-body p:last-child {
margin-bottom: 0;
}

.message-body ul,
.message-body ol {
margin: 8px 0 16px 24px;
}

.message-body li {
margin-bottom: 4px;
}

.message-body h1,
.message-body h2,
.message-body h3,
.message-body h4 {
margin: 16px 0 8px;
font-weight: 600;
}

.message-body h1 { font-size: 24px; }
.message-body h2 { font-size: 20px; }
.message-body h3 { font-size: 18px; }
.message-body h4 { font-size: 16px; }

.message-body code {
background: rgba(0,0,0,0.05);
padding: 2px 6px;
border-radius: 6px;
font-family: monospace;
font-size: 14px;
}

.message-body pre {
background: rgba(0,0,0,0.05);
padding: 12px;
border-radius: 12px;
overflow-x: auto;
margin: 12px 0;
max-width: 100%;
}

.message-body pre code {
background: none;
padding: 0;
white-space: pre-wrap;
word-break: break-word;
}

.message-body a {
color: var(--accent-color);
text-decoration: none;
}

.message-body a:hover {
text-decoration: underline;
}

.message-body img {
max-width: 100%;
height: auto;
border-radius: 12px;
margin-top: 8px;
}

.typing-indicator {
display: flex;
gap: 6px;
padding: 16px 0;
}

.typing-indicator span {
width: 10px;
height: 10px;
background: var(--accent-gradient);
border-radius: 50%;
animation: typingBounce 1.4s infinite;
}

.typing-indicator span:nth-child(2) {
animation-delay: 0.2s;
}

.typing-indicator span:nth-child(3) {
animation-delay: 0.4s;
}

@keyframes typingBounce {
0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
30% { transform: translateY(-12px); opacity: 1; }
}

.input-area {
padding: 24px 24px 32px;
}

.input-container {
max-width: 800px;
margin: 0 auto;
}

.input-wrapper {
display: flex;
align-items: flex-end;
gap: 12px;
border-radius: 28px;
padding: 8px 8px 8px 24px;
background: var(--glass-bg);
backdrop-filter: blur(12px);
border: 1px solid rgba(255, 255, 255, 0.3);
}

.input-wrapper:focus-within {
border-color: var(--accent-color);
box-shadow: 0 0 0 4px var(--accent-soft);
}

#messageInput {
flex: 1;
background: transparent;
border: none;
padding: 12px 0;
font-size: 16px;
font-family: 'Inter', sans-serif;
resize: none;
max-height: 120px;
min-height: 48px;
outline: none;
color: var(--text-primary);
width: 100%;
}

#messageInput::placeholder {
color: var(--text-tertiary);
}

.actions {
display: flex;
gap: 4px;
align-items: center;
margin-bottom: 4px;
}

.action-btn {
background: transparent;
border: none;
width: 40px;
height: 40px;
border-radius: 50%;
color: var(--text-secondary);
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
font-size: 18px;
transition: all 0.2s;
flex-shrink: 0;
}

.action-btn:hover {
color: white;
transform: scale(1.1);
background: var(--accent-soft);
}

.action-btn.send {
color: white;
background: var(--accent-gradient);
width: 44px;
height: 44px;
font-size: 20px;
}

.preview-container {
max-width: 800px;
margin: 0 auto 16px;
display: none;
}

.preview-container.show {
display: block;
}

.preview-wrapper {
position: relative;
display: inline-block;
}

.preview-image {
width: 100px;
height: 100px;
border-radius: 24px;
object-fit: cover;
border: 3px solid white;
}

.remove-preview {
position: absolute;
top: -12px;
right: -12px;
width: 32px;
height: 32px;
background: #ff4757;
border: none;
border-radius: 50%;
color: white;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
font-size: 16px;
border: 3px solid white;
}

#fileInput {
display: none;
}

.generated-image {
max-width: 100%;
border-radius: 24px;
margin: 8px 0 0 0;
border: 2px solid white;
}

.clear-context-btn {
background: transparent;
border: 1px solid var(--glass-border);
color: var(--text-secondary);
cursor: pointer;
padding: 6px 12px;
border-radius: 20px;
font-size: 12px;
display: flex;
align-items: center;
gap: 6px;
margin-left: 10px;
}

.clear-context-btn:hover {
background: var(--accent-soft);
border-color: var(--accent-color);
color: var(--accent-color);
}

/* Мобильная адаптация */
@media (max-width: 768px) {
.header {
padding: 16px 20px;
}

.header-left {
gap: 12px;
}

.fixed-avatar {
width: 48px;
height: 48px;
border-radius: 16px;
}

.glach-title {
font-size: 24px;
}

.beta-notice {
padding: 6px 12px;
font-size: 12px;
}

.creator-name {
padding: 6px 12px;
font-size: 13px;
}

.messages-inner {
padding: 0 16px;
}

.message-content {
max-width: 90%;
}

.message-body {
font-size: 15px;
padding: 14px 18px;
}

.input-area {
padding: 16px 16px 24px;
}

.input-wrapper {
padding: 6px 6px 6px 20px;
}

#messageInput {
font-size: 16px;
padding: 10px 0;
min-height: 44px;
}

.preview-container {
margin-bottom: 12px;
}

.preview-image {
width: 90px;
height: 90px;
border-radius: 20px;
}

.remove-preview {
width: 28px;
height: 28px;
font-size: 14px;
top: -10px;
right: -10px;
}
}

@media (max-width: 480px) {
.header {
padding: 12px 16px;
}

.header-left {
gap: 8px;
}

.fixed-avatar {
width: 42px;
height: 42px;
border-radius: 14px;
}

.glach-title {
font-size: 22px;
}

.beta-notice {
padding: 4px 10px;
font-size: 11px;
}

.creator-name {
padding: 4px 10px;
font-size: 12px;
}

.creator-name span {
display: none;
}

.creator-name i {
margin: 0;
}

.clear-context-btn {
padding: 4px 8px;
font-size: 10px;
margin-left: 4px;
}

.messages-inner {
padding: 0 12px;
}

.message-content {
max-width: 92%;
}

.message-body {
font-size: 14px;
padding: 12px 16px;
}

.welcome-avatar {
width: 100px;
height: 100px;
border-radius: 25px;
}

.welcome-title {
font-size: 36px;
}

.welcome-subtitle {
font-size: 16px;
}

.input-area {
padding: 12px 12px 20px;
}

.input-wrapper {
padding: 4px 4px 4px 16px;
border-radius: 24px;
}

#messageInput {
font-size: 15px;
padding: 8px 0;
min-height: 42px;
}

.action-btn {
width: 38px;
height: 38px;
font-size: 17px;
}

.action-btn.send {
width: 42px;
height: 42px;
font-size: 19px;
}

.preview-image {
width: 80px;
height: 80px;
border-radius: 18px;
}
}

/* Поддержка безопасной зоны на iPhone */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
.input-area {
padding-bottom: max(32px, env(safe-area-inset-bottom));
}
}
</style>
</head>
<body>
<div class="header">
<div class="header-left">
<div class="fixed-avatar">
<img src="https://media.tenor.com/Leq7mrkrbbgAAAAj/rabbit-r1-bunny-ai.gif" alt="Glach">
</div>
<span class="glach-title">Glach</span>
<div class="beta-notice">
<i class="fas fa-info-circle"></i>
<span>beta</span>
</div>
<button class="clear-context-btn" onclick="clearContext()">
<i class="fas fa-eraser"></i>
<span>Очистить</span>
</button>
</div>
<div class="creator-name">
<i class="fas fa-code"></i>
<span>Михаил Фуркулицэ</span>
</div>
</div>

<div class="chat-container">
<div class="welcome-screen" id="welcomeScreen">
<div class="welcome-avatar">
<img src="https://media.tenor.com/Leq7mrkrbbgAAAAj/rabbit-r1-bunny-ai.gif" alt="Glach">
</div>
<h1 class="welcome-title">Glach</h1>
<div class="welcome-subtitle">Я помогу с ответами на вопросы, проанализирую фото и поддержу беседу.<br>Спрашивайте о чём угодно!</div>
</div>

<div class="messages-area" id="messagesArea">
<div class="messages-inner" id="messagesInner"></div>
</div>

<div class="preview-container" id="previewContainer">
<div class="preview-wrapper">
<img id="previewImage" class="preview-image" src="">
<button class="remove-preview" onclick="removeImage()">×</button>
</div>
</div>

<div class="input-area">
<div class="input-container">
<div class="input-wrapper">
<textarea 
id="messageInput" 
rows="1" 
placeholder="Напишите сообщение..." 
oninput="autoResize(this)"
></textarea>
<div class="actions">
<button class="action-btn" onclick="document.getElementById('fileInput').click()">
<i class="fas fa-paperclip"></i>
</button>
<button class="action-btn send" onclick="sendMessage()">
<i class="fas fa-paper-plane"></i>
</button>
</div>
</div>
</div>
</div>

<input type="file" id="fileInput" accept="image/*" onchange="handleImageSelect(this)">
</div>

<script>
const API_KEY = "sk_6KqzxrbQIfTCxVyL6U6LsjGDNVZwcXCa";
const MODELS = { TEXT: 'gemini-fast' };

let messageHistory = [];
let currentImageBase64 = null;
let firstMessageSent = false;

const messagesInner = document.getElementById('messagesInner');
const messageInput = document.getElementById('messageInput');
const previewContainer = document.getElementById('previewContainer');
const previewImage = document.getElementById('previewImage');
const messagesArea = document.getElementById('messagesArea');
const welcomeScreen = document.getElementById('welcomeScreen');

const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
const scrollToBottom = () => {
messagesArea.scrollTo({
top: messagesArea.scrollHeight,
behavior: 'smooth'
});
};

window.addEventListener('resize', () => {
setTimeout(scrollToBottom, 100);
});

window.addEventListener('DOMContentLoaded', () => {
autoResize(messageInput);
loadHistory();
});

function saveHistory() {
const toSave = messageHistory.slice(-20);
localStorage.setItem('glach_message_history', JSON.stringify(toSave));
}

function loadHistory() {
try {
const saved = localStorage.getItem('glach_message_history');
if (saved) {
const parsed = JSON.parse(saved);
if (Array.isArray(parsed) && parsed.length > 0) {
messageHistory = parsed.slice(-20);
messagesInner.innerHTML = '';
for (const msg of messageHistory) {
if (msg.role === 'user') {
const messageDiv = document.createElement('div');
messageDiv.className = 'message user';
let contentHtml = '';
if (msg.hasImage && msg.imageData) {
contentHtml = `<div class="message-body">${msg.content ? escapeHtml(msg.content) + '<br>' : ''}<img src="${msg.imageData}" class="generated-image"></div>`;
} else {
contentHtml = `<div class="message-body">${escapeHtml(msg.content)}</div>`;
}
messageDiv.innerHTML = `<div class="message-content">${contentHtml}</div>`;
messagesInner.appendChild(messageDiv);
} else if (msg.role === 'assistant') {
const assistantDiv = document.createElement('div');
assistantDiv.className = 'message assistant';
assistantDiv.innerHTML = `<div class="message-content"><div class="message-body">${msg.content}</div></div>`;
messagesInner.appendChild(assistantDiv);
}
}
firstMessageSent = true;
welcomeScreen.classList.add('hidden');
scrollToBottom();
}
}
} catch(e) {}
}

function clearContext() {
messageHistory = [];
messagesInner.innerHTML = '';
localStorage.removeItem('glach_message_history');
firstMessageSent = false;
welcomeScreen.classList.remove('hidden');
removeImage();
}

function handleFile(file) {
const reader = new FileReader();
reader.onload = function(e) {
currentImageBase64 = e.target.result;
previewImage.src = currentImageBase64;
previewContainer.classList.add('show');
messageInput.placeholder = 'Опишите фото...';
hideWelcomeScreen();
};
reader.readAsDataURL(file);
}

function hideWelcomeScreen() {
if (!firstMessageSent) {
firstMessageSent = true;
welcomeScreen.classList.add('hidden');
}
}

function autoResize(textarea) {
textarea.style.height = 'auto';
let newHeight = textarea.scrollHeight;
const maxHeight = 120;
textarea.style.height = (newHeight > maxHeight ? maxHeight : newHeight) + 'px';
}

function escapeHtml(unsafe) {
return unsafe
.replace(/&/g, "&amp;")
.replace(/</g, "&lt;")
.replace(/>/g, "&gt;")
.replace(/"/g, "&quot;")
.replace(/'/g, "&#039;");
}

function stripHtmlTags(text) {
return text.replace(/<[^>]*>/g, '');
}

async function addNodeWithEffect(parentNode, node, speed) {
if (node.nodeType === Node.TEXT_NODE) {
const text = node.textContent;
for (let i = 0; i < text.length; i++) {
parentNode.innerHTML += text.charAt(i);
scrollToBottom();
await sleep(speed);
}
} else if (node.nodeType === Node.ELEMENT_NODE) {
const element = document.createElement(node.tagName);
Array.from(node.attributes).forEach(attr => {
element.setAttribute(attr.name, attr.value);
});
parentNode.appendChild(element);
for (const childNode of node.childNodes) {
await addNodeWithEffect(element, childNode, speed);
}
if (node.tagName === 'P' || node.tagName === 'DIV' || node.tagName === 'LI') {
await sleep(speed / 2);
}
}
}

async function typeWriter(element, html, speed = 5) {
element.innerHTML = '';
if (!html) return;
const tempDiv = document.createElement('div');
tempDiv.innerHTML = html;
for (const node of tempDiv.childNodes) {
await addNodeWithEffect(element, node, speed);
}
}

function showTyping() {
const typingDiv = document.createElement('div');
typingDiv.className = 'message assistant';
typingDiv.id = 'typingIndicator';
typingDiv.innerHTML = `
<div class="message-content">
<div class="typing-indicator">
<span></span>
<span></span>
<span></span>
</div>
</div>
`;
messagesInner.appendChild(typingDiv);
scrollToBottom();
}

function hideTyping() {
const typing = document.getElementById('typingIndicator');
if (typing) typing.remove();
}

async function sendMessage() {
const text = messageInput.value.trim();
if (!text && !currentImageBase64) return;

hideWelcomeScreen();

const messageDiv = document.createElement('div');
messageDiv.className = 'message user';
let contentHtml = '';

if (currentImageBase64) {
contentHtml = `
<div class="message-body">
${text ? escapeHtml(text) + '<br>' : ''}
<img src="${currentImageBase64}" class="generated-image">
</div>
`;
} else {
contentHtml = `<div class="message-body">${escapeHtml(text)}</div>`;
}

messageDiv.innerHTML = `<div class="message-content">${contentHtml}</div>`;
messagesInner.appendChild(messageDiv);

messageHistory.push({ 
role: 'user', 
content: text || '[Изображение]',
hasImage: !!currentImageBase64,
imageData: currentImageBase64
});
saveHistory();

messageInput.value = '';
autoResize(messageInput);
showTyping();

try {
if (currentImageBase64) {
await analyzeWithVision(text || 'Что на этом фото?');
removeImage();
} else {
await generateText(text);
}
} catch (error) {
console.error('Error:', error);
hideTyping();
const errorDiv = document.createElement('div');
errorDiv.className = 'message assistant';
errorDiv.innerHTML = `
<div class="message-content">
<div class="message-body">❌ Ошибка. Попробуйте ещё раз.</div>
</div>
`;
messagesInner.appendChild(errorDiv);
scrollToBottom();
}
}

async function generateText(prompt) {
try {
const systemPrompt = `Ты - Glach, AI-ассистент.

ВАЖНЫЕ ПРАВИЛА:
1. Отвечай сразу по существу, без приветствий и представлений
2. НЕ ПОВТОРЯЙ слова пользователя. Если пользователь написал "padding", не пиши "paddingpadding"
3. Никогда не упоминай что ты языковая модель
4. Отвечай на том же языке, на котором задан вопрос
5. Используй HTML теги для форматирования: <p> для абзацев, <strong> для важного, <ul><li> для списков
6. Будь полезным и точным`;

const contextMessages = messageHistory.slice(-20).map(msg => ({
role: msg.role,
content: msg.role === 'assistant' ? stripHtmlTags(msg.content) : msg.content
}));

const messages = [
{ role: 'system', content: systemPrompt },
...contextMessages,
{ role: 'user', content: prompt }
];

const response = await fetch('https://gen.pollinations.ai/v1/chat/completions', {
method: 'POST',
headers: {
'Authorization': `Bearer ${API_KEY}`,
'Content-Type': 'application/json'
},
body: JSON.stringify({
model: MODELS.TEXT,
messages: messages
})
});

const data = await response.json();
hideTyping();

if (data.choices && data.choices[0]) {
const assistantDiv = document.createElement('div');
assistantDiv.className = 'message assistant';
const contentDiv = document.createElement('div');
contentDiv.className = 'message-content';
const bodyDiv = document.createElement('div');
bodyDiv.className = 'message-body';
contentDiv.appendChild(bodyDiv);
assistantDiv.appendChild(contentDiv);
messagesInner.appendChild(assistantDiv);

let rawText = data.choices[0].message.content;

// Убираем повторяющиеся слова
rawText = rawText.replace(/\b(\w+)\1\b/gi, '$1');
rawText = rawText.replace(/([а-яa-z]+)\1{2,}/gi, '$1');

if (!rawText.includes('<p>') && !rawText.includes('<div>') && !rawText.includes('<ul>') && !rawText.includes('<ol>')) {
const paragraphs = rawText.split(/\n\s*\n/);
if (paragraphs.length > 1) {
rawText = paragraphs.map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
} else {
rawText = `<p>${rawText.replace(/\n/g, '<br>')}</p>`;
}
} else {
rawText = rawText.replace(/\n/g, '<br>');
}

await typeWriter(bodyDiv, rawText, 5);
messageHistory.push({ role: 'assistant', content: rawText });
saveHistory();
}
} catch (error) {
hideTyping();
const errorDiv = document.createElement('div');
errorDiv.className = 'message assistant';
errorDiv.innerHTML = `
<div class="message-content">
<div class="message-body">❌ Ошибка генерации</div>
</div>
`;
messagesInner.appendChild(errorDiv);
scrollToBottom();
}
}
